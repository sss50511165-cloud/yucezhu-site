<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>雲端知識誌</title>
<link rel="stylesheet" href="./assets/theme.css">
<style>
  /* ── HERO BANNER ── */
  .hero-banner {
    position: relative;
    height: 480px;
    overflow: hidden;
  }

  .hero-bg {
    position: absolute;
    inset: 0;
    background: url('./images/whale-header.webp') center right / cover no-repeat;
  }

  .hero-overlay {
    position: absolute;
    inset: 0;
    background: linear-gradient(to right,
      rgba(10,8,4,0.92) 0%,
      rgba(10,8,4,0.5) 50%,
      transparent 80%
    );
  }

  .hero-content {
    position: relative;
    z-index: 1;
    height: 100%;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding-left: 8%;
    max-width: 50%;
  }

  .hero-kicker {
    font-family: 'Cormorant Garamond', serif;
    font-size: 11px;
    font-weight: 400;
    letter-spacing: 5px;
    text-transform: uppercase;
    color: var(--accent);
    opacity: 0;
    animation: slideInLeft 1s cubic-bezier(0.25, 0.1, 0.25, 1) 0s forwards;
  }

  .hero-rule {
    width: 32px;
    height: 1px;
    background: var(--accent);
    margin: 20px 0;
    opacity: 0;
    animation: slideInLeft 1s cubic-bezier(0.25, 0.1, 0.25, 1) 0.2s forwards;
  }

  .hero-title {
    font-size: 56px;
    line-height: 1.15;
    margin: 0;
    opacity: 0;
    animation: slideInLeft 1s cubic-bezier(0.25, 0.1, 0.25, 1) 0.4s forwards;
  }

  .hero-title .t-main {
    font-family: 'Playfair Display', serif;
    font-weight: 500;
    color: var(--text-primary);
    display: block;
  }

  .hero-title .t-brand {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 400;
    font-style: italic;
    color: var(--accent);
    display: block;
  }

  .hero-sub-zh {
    font-family: 'Noto Serif TC', serif;
    font-size: 15px;
    font-weight: 300;
    color: var(--text-secondary);
    margin-top: 22px;
    opacity: 0;
    animation: slideInLeft 1s cubic-bezier(0.25, 0.1, 0.25, 1) 0.6s forwards;
  }

  .hero-sub-en {
    font-family: 'Cormorant Garamond', serif;
    font-size: 14px;
    font-weight: 300;
    font-style: italic;
    color: var(--text-tertiary);
    margin-top: 8px;
    opacity: 0;
    animation: slideInLeft 1s cubic-bezier(0.25, 0.1, 0.25, 1) 0.8s forwards;
  }

  .hero-vol {
    position: absolute;
    bottom: 28px;
    right: 32px;
    font-family: 'Cormorant Garamond', serif;
    font-size: 10px;
    font-style: italic;
    letter-spacing: 3px;
    color: rgba(232, 221, 200, 0.3);
    z-index: 1;
  }

  /* ── MAIN CONTENT ── */
  .main-content {
    max-width: 1200px;
    margin: 0 auto;
    padding: 72px 40px 80px;
  }

  /* ── DUAL COLUMNS ── */
  .dual {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 56px;
    align-items: start;
  }

  .column-section {
    opacity: 0;
    animation: fadeUp 0.8s cubic-bezier(0.25, 0.1, 0.25, 1) forwards;
  }

  .column-section:nth-child(1) { animation-delay: 0.2s; }
  .column-section:nth-child(2) { animation-delay: 0.35s; }

  /* ── SECTION HEADER ── */
  .section-top {
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    margin-bottom: 32px;
  }

  .section-more {
    font-family: 'Cormorant Garamond', serif;
    font-size: 12px;
    font-style: italic;
    letter-spacing: 2px;
    color: var(--text-tertiary);
    text-decoration: none;
    display: flex;
    align-items: center;
    gap: 6px;
    transition: color 0.4s cubic-bezier(0.25, 0.1, 0.25, 1);
  }

  .section-more:hover {
    color: var(--accent);
  }

  .section-more .arrow {
    display: inline-block;
    transition: transform 0.4s cubic-bezier(0.25, 0.1, 0.25, 1);
  }

  .section-more:hover .arrow {
    transform: translateX(4px);
  }

  /* ── CARD LIST ── */
  .card-list {
    list-style: none;
    display: grid;
    gap: 20px;
  }

  .card-list li {
    opacity: 0;
    transform: translateY(16px);
    transition: opacity 0.6s cubic-bezier(0.25, 0.1, 0.25, 1), transform 0.6s cubic-bezier(0.25, 0.1, 0.25, 1);
  }

  .card-list li.in-view {
    opacity: 1;
    transform: translateY(0);
  }

  .card-list a {
    text-decoration: none;
    color: inherit;
    display: block;
  }

  .card-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 8px;
  }

  .card-stars {
    font-size: 11px;
    color: var(--accent);
    letter-spacing: 1px;
  }

  /* ── FOOTER ── */
  .index-footer {
    margin-top: 0;
  }

  /* ── RESPONSIVE ── */
  @media (max-width: 860px) {
    .hero-banner {
      height: 320px;
    }

    .hero-content {
      padding-left: 24px;
      max-width: 80%;
    }

    .hero-title {
      font-size: 36px;
    }

    .hero-sub-zh {
      font-size: 13px;
    }

    .hero-vol {
      display: none;
    }

    .main-content {
      padding: 40px 20px 60px;
    }

    .dual {
      grid-template-columns: 1fr;
      gap: 56px;
    }
  }
</style>
</head>
<body>

<button id="theme-toggle" aria-label="切換明暗模式" style="
  position: fixed;
  top: 16px;
  right: 16px;
  z-index: 1000;
  background: var(--bg-card);
  border: 0.5px solid var(--border-color);
  border-radius: 50%;
  width: 40px;
  height: 40px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 16px;
  color: var(--accent);
  transition: all 0.3s ease;
  backdrop-filter: blur(8px);
" onclick="
  const t = document.documentElement.dataset.theme === 'light' ? '' : 'light';
  document.documentElement.dataset.theme = t;
  localStorage.setItem('theme', t);
  this.textContent = t === 'light' ? '🌙' : '☀️';
">☀️</button>
<script>
  (function(){
    const saved = localStorage.getItem('theme');
    if (saved) {
      document.documentElement.dataset.theme = saved;
      const btn = document.getElementById('theme-toggle');
      if (btn) btn.textContent = saved === 'light' ? '🌙' : '☀️';
    }
  })();
</script>

<!-- ── HERO BANNER ── -->
<div class="hero-banner">
  <div class="hero-bg"></div>
  <div class="hero-overlay"></div>
  <div class="hero-content">
    <div class="hero-kicker">Knowledge · Every Day</div>
    <div class="hero-rule"></div>
    <h1 class="hero-title">
      <span class="t-main">雲端</span>
      <span class="t-brand">知識誌</span>
    </h1>
    <p class="hero-sub-zh">整合每日財經與醫學新知</p>
    <p class="hero-sub-en">Where market pulses meet medical wisdom.</p>
  </div>
  <div class="hero-vol">MMXXVI · VOL. I</div>
</div>

<!-- ── MAIN CONTENT ── -->
<div class="main-content">

  <div class="accent-bar" style="margin-bottom: 56px;"></div>

  <div class="dual">

    <!-- ── STOCKS ── -->
    <div class="column-section">
      <div class="section-top">
        <div class="kicker">
          <div class="kicker-en">Market Briefing</div>
          <div class="kicker-zh">市場脈動</div>
          <div class="kicker-line"></div>
        </div>
        <a class="section-more" href="./stocks/index.html">
          查看全部 <span class="arrow">→</span>
        </a>
      </div>
      <ul class="card-list" id="stock-list">
        <li><div class="loading-row"><div class="loading-dot"></div><span>載入中...</span></div></li>
      </ul>
    </div>

    <!-- ── MEDICAL ── -->
    <div class="column-section">
      <div class="section-top">
        <div class="kicker">
          <div class="kicker-en">Medical Pulse</div>
          <div class="kicker-zh">臨床動態</div>
          <div class="kicker-line"></div>
        </div>
        <a class="section-more" href="./medical/index.html">
          查看全部 <span class="arrow">→</span>
        </a>
      </div>
      <ul class="card-list" id="med-list">
        <li><div class="loading-row"><div class="loading-dot"></div><span>載入中...</span></div></li>
      </ul>
    </div>

  </div>
</div>

<!-- ── FOOTER ── -->
<footer class="site-footer index-footer">
  <div class="footer-left">© 2026 雲端知識誌 · 每日自動更新</div>
  <div class="footer-right">Powered by Claude · Hosted on GitHub Pages</div>
</footer>

<script>
  const MAX_ITEMS = 5;

  // ── Stock list ──
  fetch('./stocks.json')
    .then(r => r.json())
    .then(data => {
      const files = Array.isArray(data) ? data : (data.files || []);
      const sorted = [...files].sort().reverse().slice(0, MAX_ITEMS);
      const list = document.getElementById('stock-list');
      list.innerHTML = '';

      if (sorted.length === 0) {
        list.innerHTML = '<li><div class="empty-state">尚無摘要，敬請期待</div></li>';
        return;
      }

      sorted.forEach((file, i) => {
        const date = file.replace('.json', '').replace('.html', '');
        const li = document.createElement('li');

        li.innerHTML = `
          <a href="./stocks/viewer.html?d=${date}">
            <div class="card">
              <div class="card-header">
                <div class="card-tag">每日摘要</div>
                <div class="card-date">${date}</div>
              </div>
              <div class="card-title">股市摘要 — ${date}</div>
              <div class="card-rule"></div>
              <div class="card-excerpt">台股美股每日重點事件整理，掌握市場動態。</div>
              <div class="card-read">閱讀全文 <span class="arrow">→</span></div>
            </div>
          </a>`;
        list.appendChild(li);
      });
    })
    .catch(() => {
      document.getElementById('stock-list').innerHTML =
        '<li><div class="empty-state">無法載入資料</div></li>';
    });

  // ── Medical list ──
  const DEPT_MAP = {
    '心臟科': '❤️', '內分泌科': '🔬', '感染科': '🦠',
    '腎臟科': '💧', '胸腔科': '🫁'
  };

  fetch('./medical.json')
    .then(r => r.json())
    .then(data => {
      const items = (Array.isArray(data) ? data : []).slice(0, MAX_ITEMS);
      const list = document.getElementById('med-list');
      list.innerHTML = '';

      if (items.length === 0) {
        list.innerHTML = '<li><div class="empty-state">尚無文獻，敬請期待</div></li>';
        return;
      }

      items.forEach((item, i) => {
        const key = item.filename.replace('.json', '');
        const stars = `<span class="star-filled">${'★'.repeat(item.stars || 0)}</span><span class="star-empty">${'☆'.repeat(5 - (item.stars || 0))}</span>`;
        const icon = DEPT_MAP[item.department] || '🏥';
        const li = document.createElement('li');

        li.innerHTML = `
          <a href="./medical/viewer.html?d=${encodeURIComponent(key)}">
            <div class="card">
              <div class="card-header">
                <div class="card-tag">${icon} ${item.department}</div>
                <div class="card-date">${item.pub_date || item.date}</div>
              </div>
              <div class="card-title">${item.summary || item.title_zh || ''}</div>
              <div class="card-rule"></div>
              <div class="card-excerpt">${item.title_zh || ''}</div>
              <div class="card-header" style="margin-top:14px; margin-bottom:0;">
                <div class="card-read">閱讀全文 <span class="arrow">→</span></div>
                <div class="card-stars">${stars}</div>
              </div>
            </div>
          </a>`;
        list.appendChild(li);
      });
    })
    .catch(() => {
      document.getElementById('med-list').innerHTML =
        '<li><div class="empty-state">無法載入資料</div></li>';
    });
</script>

<button id="back-to-top" aria-label="回到頂部" title="回到頂部">↑</button>
<script>
(function(){
  const btn = document.getElementById('back-to-top');
  window.addEventListener('scroll', () => {
    btn.classList.toggle('visible', window.scrollY > 400);
  });
  btn.addEventListener('click', () => {
    window.scrollTo({ top: 0, behavior: 'smooth' });
  });
})();
</script>

<script>
(function(){
  const observer = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      if (entry.isIntersecting) {
        entry.target.classList.add('in-view');
        observer.unobserve(entry.target);
      }
    });
  }, { threshold: 0.1 });

  const lists = document.querySelectorAll('.card-list, #stock-list, #med-list');
  const mo = new MutationObserver(() => {
    document.querySelectorAll('.card-list li:not(.in-view)').forEach((li, i) => {
      li.style.transitionDelay = `${i * 0.1}s`;
      observer.observe(li);
    });
  });
  lists.forEach(list => mo.observe(list, { childList: true }));
})();
</script>
</body>
</html>
