<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>內科新知 — 雲端知識誌</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=IBM+Plex+Mono:wght@400;600&family=Noto+Sans+TC:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #08090d;
    --surface: #0f1117;
    --surface2: #13151f;
    --border: #1a1d2c;
    --border2: #252840;
    --teal: #3db8a8;
    --teal-dim: rgba(61,184,168,0.08);
    --teal-dim2: rgba(61,184,168,0.18);
    --gold: #c9a84c;
    --gold-dim: rgba(201,168,76,0.1);
    --up: #3dd68c;
    --warn: #f5c842;
    --text: #e2e4f0;
    --muted: #5a6080;
    --dim: #2a2d40;
  }

  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  html { scroll-behavior: smooth; }

  body {
    background: var(--bg); color: var(--text);
    font-family: 'Noto Sans TC', sans-serif;
    font-weight: 300; min-height: 100vh; overflow-x: hidden;
  }

  body::after {
    content: '';
    position: fixed; inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none; z-index: 999; opacity: 0.5;
  }

  /* ── HEADER ── */
  header {
    padding: 0 32px; border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
    height: 64px; animation: fadeDown 0.6s ease both;
  }
  .logo { display: flex; align-items: center; gap: 14px; text-decoration: none; }
  .logo-mark {
    width: 32px; height: 32px; border: 1px solid var(--gold);
    display: flex; align-items: center; justify-content: center; position: relative;
  }
  .logo-mark::before { content: ''; position: absolute; inset: 3px; background: rgba(201,168,76,0.15); }
  .logo-mark span { font-family: 'IBM Plex Mono', monospace; font-size: 11px; font-weight: 600; color: var(--gold); position: relative; }
  .logo-text { font-family: 'DM Serif Display', serif; font-size: 18px; color: var(--text); }

  .back-nav {
    font-family: 'IBM Plex Mono', monospace; font-size: 10px;
    letter-spacing: 0.15em; text-transform: uppercase;
    color: var(--muted); text-decoration: none;
    display: flex; align-items: center; gap: 6px; transition: color 0.2s;
  }
  .back-nav:hover { color: var(--teal); }

  /* ── PAGE WRAP ── */
  .page-wrap {
    max-width: 860px; margin: 0 auto;
    padding: 0 32px 80px;
    animation: fadeUp 0.7s 0.1s ease both;
  }

  /* ── ARTICLE HEADER ── */
  .article-head { padding: 56px 0 40px; border-bottom: 1px solid var(--border); }

  .article-eyebrow {
    font-family: 'IBM Plex Mono', monospace; font-size: 10px;
    letter-spacing: 0.22em; text-transform: uppercase; color: var(--teal);
    margin-bottom: 16px; display: flex; align-items: center; gap: 12px;
  }
  .article-eyebrow::before { content: ''; width: 20px; height: 1px; background: var(--teal); }

  .article-title-zh {
    font-family: 'DM Serif Display', serif;
    font-size: clamp(22px, 3.5vw, 34px);
    line-height: 1.25; font-weight: 400; color: var(--text);
    margin-bottom: 16px;
  }

  .article-title-en {
    font-size: 13px; font-style: italic;
    color: var(--muted); line-height: 1.6;
    padding: 12px 16px;
    border-left: 2px solid var(--teal);
    background: var(--teal-dim);
    border-radius: 0 3px 3px 0;
    margin-bottom: 20px;
  }

  .ai-badge {
    display: inline-flex; align-items: center; gap: 6px;
    font-family: 'IBM Plex Mono', monospace; font-size: 9px;
    letter-spacing: 0.12em; text-transform: uppercase;
    color: var(--warn); background: rgba(245,200,66,0.08);
    border: 1px solid rgba(245,200,66,0.2);
    border-radius: 2px; padding: 3px 8px;
  }

  .article-meta {
    margin-top: 20px; display: flex; flex-wrap: wrap; gap: 12px;
    align-items: center;
  }
  .meta-pill {
    font-family: 'IBM Plex Mono', monospace; font-size: 10px;
    letter-spacing: 0.1em; color: var(--muted);
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 2px; padding: 4px 10px;
  }
  .meta-pill.verified { color: var(--up); border-color: rgba(61,214,140,0.2); background: rgba(61,214,140,0.05); }

  /* ── SECTIONS ── */
  .article-body { padding: 40px 0; display: grid; gap: 32px; }

  .section-block {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px; overflow: hidden;
  }

  .section-head {
    padding: 12px 20px; border-bottom: 1px solid var(--border);
    font-family: 'IBM Plex Mono', monospace; font-size: 10px;
    letter-spacing: 0.18em; text-transform: uppercase; color: var(--teal);
    display: flex; align-items: center; gap: 10px;
  }
  .section-head .icon { font-size: 13px; }

  .section-body { padding: 20px; }

  /* Journal table */
  .info-table { width: 100%; border-collapse: collapse; }
  .info-table tr { border-bottom: 1px solid var(--border); }
  .info-table tr:last-child { border-bottom: none; }
  .info-table td { padding: 10px 0; font-size: 13px; vertical-align: top; }
  .info-table td:first-child { color: var(--muted); width: 130px; }
  .info-table td:last-child { color: var(--text); }
  .info-table a { color: var(--teal); text-decoration: none; }
  .info-table a:hover { text-decoration: underline; }

  /* Design note */
  .design-type {
    font-family: 'IBM Plex Mono', monospace; font-size: 11px;
    letter-spacing: 0.1em; text-transform: uppercase;
    color: var(--teal); margin-bottom: 8px;
  }
  .design-note { font-size: 13px; color: var(--muted); line-height: 1.8; }

  /* Findings / clinical */
  .point-list { list-style: none; display: grid; gap: 10px; }
  .point-item {
    display: flex; gap: 12px; align-items: flex-start;
    font-size: 13px; line-height: 1.8; color: var(--text);
  }
  .point-marker {
    font-family: 'IBM Plex Mono', monospace; font-size: 10px;
    color: var(--teal); background: var(--teal-dim);
    border: 1px solid var(--teal-dim2); border-radius: 2px;
    padding: 2px 6px; margin-top: 3px; flex-shrink: 0;
  }
  .point-marker.clinical { color: var(--gold); background: var(--gold-dim); border-color: rgba(201,168,76,0.2); }

  /* Keywords */
  .keyword-list { display: flex; flex-wrap: wrap; gap: 8px; }
  .keyword-tag {
    font-family: 'IBM Plex Mono', monospace; font-size: 10px;
    letter-spacing: 0.08em; color: var(--muted);
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 2px; padding: 4px 10px;
  }

  /* Rating */
  .rating-stars { font-size: 20px; color: var(--gold); margin-bottom: 10px; }
  .rating-reason { font-size: 13px; color: var(--muted); line-height: 1.8; }

  /* Notice */
  .notice-block {
    background: rgba(245,200,66,0.05); border: 1px solid rgba(245,200,66,0.15);
    border-radius: 4px; padding: 16px 20px;
    font-size: 12px; color: var(--muted); line-height: 1.9;
  }
  .notice-block strong { color: var(--warn); }

  /* PMID link button */
  .pubmed-btn {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 10px 20px; margin-top: 16px;
    background: var(--teal-dim); border: 1px solid var(--teal);
    border-radius: 3px; color: var(--teal);
    font-family: 'IBM Plex Mono', monospace; font-size: 11px;
    letter-spacing: 0.12em; text-transform: uppercase;
    text-decoration: none; transition: background 0.2s;
  }
  .pubmed-btn:hover { background: var(--teal-dim2); }

  /* ── LOADING / ERROR ── */
  .state-box {
    padding: 80px 32px; text-align: center;
    color: var(--muted); font-family: 'IBM Plex Mono', monospace;
    font-size: 12px; letter-spacing: 0.1em;
  }

  /* ── FOOTER ── */
  footer {
    border-top: 1px solid var(--border);
    padding: 20px 32px; display: flex;
    justify-content: space-between; align-items: center;
    flex-wrap: wrap; gap: 12px;
  }
  .footer-left, .footer-right {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px; letter-spacing: 0.12em; color: var(--dim);
  }

  /* ── ANIMATIONS ── */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(14px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes fadeDown {
    from { opacity: 0; transform: translateY(-8px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  @media (max-width: 768px) {
    header { padding: 0 20px; }
    .page-wrap { padding: 0 20px 60px; }
    .article-head { padding: 40px 0 28px; }
    footer { padding: 16px 20px; }
    .info-table td:first-child { width: 90px; font-size: 11px; }
  }
</style>
</head>
<body>

<!-- HEADER -->
<header>
  <a class="logo" href="/">
    <div class="logo-mark"><span>誌</span></div>
    <span class="logo-text">雲端知識誌</span>
  </a>
  <a class="back-nav" href="./index.html">← 醫學新知列表</a>
</header>

<!-- CONTENT (rendered by JS) -->
<div class="page-wrap" id="page-content">
  <div class="state-box">載入中...</div>
</div>

<!-- FOOTER -->
<footer>
  <div class="footer-left">© 2026 雲端知識誌 · AI 整理，非醫療建議</div>
  <div class="footer-right">POWERED BY CLAUDE · HOSTED ON GITHUB PAGES</div>
</footer>

<script>
  const params = new URLSearchParams(location.search);
  const key    = params.get('d');   // e.g. "2026-04-11_10-08"

  if (!key) {
    document.getElementById('page-content').innerHTML =
      '<div class="state-box">⚠ 未指定文獻，請從列表進入。</div>';
  } else {
    fetch(`./${key}.json`)
      .then(r => { if (!r.ok) throw new Error('not found'); return r.json(); })
      .then(render)
      .catch(() => {
        document.getElementById('page-content').innerHTML =
          '<div class="state-box">⚠ 找不到文獻資料，請確認網址是否正確。</div>';
      });
  }

  function stars(n) {
    n = n || 0;
    return '★'.repeat(n) + '☆'.repeat(Math.max(0, 5 - n));
  }

  function render(d) {
    const p = d.paper || {};
    const rating = d.rating || {};
    const design = d.design || {};
    const ver = d.verification || {};

    document.title = `${p.title_zh || '醫學新知'} — 雲端知識誌`;

    const verified = ver.pmid_checked && ver.title_matched && ver.date_in_range;

    const html = `
      <!-- ARTICLE HEADER -->
      <div class="article-head">
        <div class="article-eyebrow">
          ${d.department || '內科'} · ${d.date || ''} ${d.time || ''}
        </div>
        <h1 class="article-title-zh">${p.title_zh || '—'}</h1>
        <div class="article-title-en">${p.title_en || ''}</div>
        <span class="ai-badge">⚠ AI 翻譯 · 請人工校對</span>
        <div class="article-meta">
          <span class="meta-pill">📰 ${p.journal || '—'}</span>
          <span class="meta-pill">📅 ${p.published || '—'}</span>
          <span class="meta-pill">🔬 ${design.type || '—'}</span>
          ${verified ? '<span class="meta-pill verified">✅ PMID 已驗證</span>' : ''}
        </div>
      </div>

      <!-- ARTICLE BODY -->
      <div class="article-body">

        <!-- 期刊資訊 -->
        <div class="section-block">
          <div class="section-head"><span class="icon">📖</span> 期刊資訊</div>
          <div class="section-body">
            <table class="info-table">
              <tr><td>期刊</td><td>${p.journal || '—'}</td></tr>
              <tr><td>影響因子</td><td>${p.impact_factor || '請至 JCR 手動確認'}</td></tr>
              <tr><td>發表日期</td><td>${p.published || '—'}</td></tr>
              <tr><td>PMID</td><td>${p.pmid || '—'}</td></tr>
              <tr><td>原文連結</td><td><a href="${p.url || '#'}" target="_blank" rel="noopener">PubMed →</a></td></tr>
            </table>
            <a class="pubmed-btn" href="${p.url || '#'}" target="_blank" rel="noopener">
              🔗 開啟 PubMed 原文
            </a>
          </div>
        </div>

        <!-- 研究設計 -->
        <div class="section-block">
          <div class="section-head"><span class="icon">👥</span> 研究設計</div>
          <div class="section-body">
            <div class="design-type">${design.type || '—'}</div>
            <div class="design-note">${design.note || '—'}</div>
          </div>
        </div>

        <!-- 核心發現 -->
        <div class="section-block">
          <div class="section-head"><span class="icon">🔬</span> 核心發現</div>
          <div class="section-body">
            <ul class="point-list">
              ${(d.findings || []).map((f, i) =>
                `<li class="point-item">
                  <span class="point-marker">${String(i+1).padStart(2,'0')}</span>
                  <span>${f}</span>
                </li>`
              ).join('')}
            </ul>
          </div>
        </div>

        <!-- 臨床意義 -->
        <div class="section-block">
          <div class="section-head"><span class="icon">💡</span> 臨床意義</div>
          <div class="section-body">
            <ul class="point-list">
              ${(d.clinical_points || []).map((c, i) =>
                `<li class="point-item">
                  <span class="point-marker clinical">${String(i+1).padStart(2,'0')}</span>
                  <span>${c}</span>
                </li>`
              ).join('')}
            </ul>
          </div>
        </div>

        <!-- 關鍵詞 & 評分 -->
        <div style="display:grid; grid-template-columns:1fr 1fr; gap:16px;">
          <div class="section-block">
            <div class="section-head"><span class="icon">🏷</span> 關鍵詞</div>
            <div class="section-body">
              <div class="keyword-list">
                ${(d.keywords || []).map(k => `<span class="keyword-tag">${k}</span>`).join('')}
              </div>
            </div>
          </div>
          <div class="section-block">
            <div class="section-head"><span class="icon">⭐</span> 重要度</div>
            <div class="section-body">
              <div class="rating-stars">${stars(rating.stars)}</div>
              <div class="rating-reason">${rating.reason || '—'}</div>
            </div>
          </div>
        </div>

        <!-- 注意事項 -->
        <div class="notice-block">
          <strong>⚠ 使用注意</strong><br>
          本摘要由 AI 自動整理，僅供參考，不構成醫療建議。<br>
          中文翻譯為機器翻譯，請人工校對後再引用。<br>
          Impact Factor 請至 <a href="https://jcr.clarivate.com" target="_blank" style="color:var(--warn)">JCR</a> 或 Scimago 手動查詢。<br>
          建議閱讀 <a href="${p.url || '#'}" target="_blank" style="color:var(--warn)">PubMed 原文 Abstract</a> 確認所有數據。
        </div>

      </div>
    `;

    document.getElementById('page-content').innerHTML = html;
  }
</script>
</body>
</html>
