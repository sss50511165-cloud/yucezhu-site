<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>內科新知 — 雲端知識誌</title>
<link rel="stylesheet" href="../assets/theme.css">
<link rel="alternate" type="application/rss+xml" title="雲端知識誌" href="../feed.xml">
<style>
  /* ── PAGE WRAP ── */
  .page-wrap {
    max-width: 680px;
    margin: 0 auto;
    padding: 0 32px 80px;
    background: var(--bg-primary);
    animation: fadeUp 0.7s 0.1s cubic-bezier(0.25, 0.1, 0.25, 1) both;
  }

  /* ── ARTICLE HEADER ── */
  .article-head {
    padding: 56px 0 40px;
    border-bottom: 0.5px solid var(--border-color);
  }

  .article-eyebrow {
    font-family: 'Cormorant Garamond', serif;
    font-size: 11px;
    font-weight: 300;
    font-style: italic;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 18px;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .article-eyebrow::before {
    content: '';
    width: 20px;
    height: 1px;
    background: var(--accent);
  }

  .article-title-zh {
    font-family: 'Playfair Display', 'LXGW WenKai TC', 'Noto Serif TC', serif;
    font-size: clamp(22px, 3.5vw, 32px);
    line-height: 1.35;
    font-weight: 500;
    color: var(--text-primary);
    margin-bottom: 18px;
  }

  .article-title-en {
    font-family: 'Cormorant Garamond', serif;
    font-size: 14px;
    font-weight: 300;
    font-style: italic;
    color: var(--text-secondary);
    line-height: 1.6;
    padding: 14px 18px;
    border-left: 2px solid var(--accent);
    background: rgba(201, 147, 91, 0.04);
    border-radius: 0 4px 4px 0;
    margin-bottom: 22px;
    letter-spacing: 0.3px;
  }

  .article-meta {
    margin-top: 22px;
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    align-items: center;
  }

  /* ── ARTICLE BODY ── */
  .article-body {
    padding: 44px 0;
    display: grid;
    gap: 28px;
    font-size: 16px;
    line-height: 1.9;
  }

  /* Design note */
  .design-type {
    font-family: 'Cormorant Garamond', serif;
    font-size: 12px;
    font-weight: 300;
    font-style: italic;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 10px;
  }

  .design-note {
    font-family: 'LXGW WenKai TC', 'Noto Serif TC', serif;
    font-size: 16px;
    font-weight: 400;
    color: var(--text-secondary);
    line-height: 2.0;
  }

  /* Rating */
  .rating-stars {
    font-size: 20px;
    color: var(--accent);
    letter-spacing: 2px;
    margin-bottom: 12px;
  }

  .rating-reason {
    font-family: 'LXGW WenKai TC', 'Noto Serif TC', serif;
    font-size: 15px;
    font-weight: 400;
    color: var(--text-secondary);
    line-height: 2.0;
  }

  /* Two-column grid */
  .two-col {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
  }

  /* ── RESPONSIVE ── */
  @media (max-width: 768px) {
    .page-wrap { padding: 0 20px 60px; }
    .article-head { padding: 40px 0 28px; }
    .two-col { grid-template-columns: 1fr; }
    .article-body { font-size: 15px; }
    .design-note { font-size: 15px; }
  }
</style>
</head>
<body>

<button id="theme-toggle" aria-label="切換明暗模式" style="
  position: fixed;
  top: 16px;
  right: 16px;
  z-index: 1000;
  background: var(--bg-card);
  border: 0.5px solid var(--border-color);
  border-radius: 50%;
  width: 40px;
  height: 40px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 16px;
  color: var(--accent);
  transition: all 0.3s ease;
  backdrop-filter: blur(8px);
" onclick="
  const t = document.documentElement.dataset.theme === 'light' ? '' : 'light';
  document.documentElement.dataset.theme = t;
  localStorage.setItem('theme', t);
  this.textContent = t === 'light' ? '🌙' : '☀️';
">☀️</button>
<script>
  (function(){
    const saved = localStorage.getItem('theme');
    if (saved) {
      document.documentElement.dataset.theme = saved;
      const btn = document.getElementById('theme-toggle');
      if (btn) btn.textContent = saved === 'light' ? '🌙' : '☀️';
    }
  })();
</script>
<script src="../assets/bookmarks.js"></script>

<div id="reading-progress" style="
  position: fixed;
  top: 0;
  left: 0;
  height: 2px;
  width: 0%;
  background: linear-gradient(90deg, var(--accent), var(--accent-light));
  z-index: 9999;
  transition: width 0.1s linear;
  pointer-events: none;
"></div>
<script>
(function(){
  const bar = document.getElementById('reading-progress');
  window.addEventListener('scroll', () => {
    const scrollTop = window.scrollY;
    const docHeight = document.documentElement.scrollHeight - window.innerHeight;
    const progress = docHeight > 0 ? (scrollTop / docHeight) * 100 : 0;
    bar.style.width = Math.min(progress, 100) + '%';
  });
})();
</script>

<!-- NAV -->
<nav class="site-nav">
  <a class="nav-logo" href="../">
    <div class="nav-logo-mark"><span>誌</span></div>
    <div class="nav-logo-title">
      <span class="t-zh">雲端</span>
      <span class="t-brand">知識誌</span>
    </div>
  </a>
  <a class="nav-back" href="./index.html">← 醫學新知列表</a>
</nav>

<!-- CONTENT (rendered by JS) -->
<div class="page-wrap" id="page-content">
  <div class="center-msg" style="min-height:40vh;">
    <div class="loading-dot"></div>
    <span>載入中...</span>
  </div>
</div>

<div class="related-section" id="related-section" style="display:none; max-width:800px; margin:0 auto; padding:0 40px 48px;">
  <div class="kicker" style="margin-bottom:20px;">
    <div class="kicker-en">Related Articles</div>
    <div class="kicker-zh">相關文獻</div>
    <div class="kicker-line"></div>
  </div>
  <div class="related-grid" id="related-grid"></div>
</div>

<div class="nav-hint" id="nav-hint" style="display:none;">
  <span id="nav-prev" class="nav-hint-item">← 上一篇</span>
  <span class="nav-hint-divider">|</span>
  <span id="nav-next" class="nav-hint-item">下一篇 →</span>
</div>

<!-- FOOTER -->
<footer class="site-footer">
  <div class="footer-left">© 2026 雲端知識誌 · AI 整理，非醫療建議</div>
  <div class="footer-right">Powered by Claude · Hosted on GitHub Pages
    <a href="../feed.xml" class="rss-link" target="_blank" aria-label="RSS Feed" title="RSS 訂閱"><svg width="14" height="14" viewBox="0 0 448 448" fill="currentColor"><path d="M64 400c0 26.5 21.5 48 48 48s48-21.5 48-48-21.5-48-48-48-48 21.5-48 48zm0-192v80c70.7 0 128 57.3 128 128h80c0-114.9-93.1-208-208-208zm0-160v80c185 0 336 151 336 336h80C480 232.8 295.2 48 64 48z"/></svg></a>
    <a href="javascript:void(0)" class="guide-trigger" onclick="if(window.startGuide)window.startGuide();" title="使用指南">?</a>
  </div>
</footer>

<script>
  const params = new URLSearchParams(location.search);
  const key    = params.get('d');
  let currentDept = '';

  if (!key) {
    document.getElementById('page-content').innerHTML =
      '<div class="center-msg"><span>未指定文獻，請從列表進入。</span></div>';
  } else {
    fetch(`./${key}.json`)
      .then(r => { if (!r.ok) throw new Error('not found'); return r.json(); })
      .then(d => {
        currentDept = d.department || '';
        render(d);
        loadRelated();
      })
      .catch(() => {
        document.getElementById('page-content').innerHTML =
          '<div class="center-msg"><span>找不到文獻資料，請確認網址是否正確。</span></div>';
      });
  }

  function loadRelated() {
    fetch('../medical.json')
      .then(r => r.json())
      .then(allItems => {
        const items = Array.isArray(allItems) ? allItems : [];
        const related = items
          .filter(item => {
            const k = item.filename.replace('.json', '');
            return k !== key && item.department === currentDept;
          })
          .slice(0, 3);

        if (related.length < 3) {
          const more = items
            .filter(item => {
              const k = item.filename.replace('.json', '');
              return k !== key && !related.some(r => r.filename.replace('.json','') === k);
            })
            .slice(0, 3 - related.length);
          related.push(...more);
        }

        if (related.length === 0) return;

        const DEPT_MAP = {'心臟科':'❤️','內分泌科':'🔬','感染科':'🦠','腎臟科':'💧','胸腔科':'🫁'};
        const section = document.getElementById('related-section');
        const grid = document.getElementById('related-grid');

        let html = '';
        related.forEach(item => {
          const k = item.filename.replace('.json', '');
          const icon = DEPT_MAP[item.department] || '📋';
          html += `
            <a href="./viewer.html?d=${encodeURIComponent(k)}">
              <div class="card">
                <div class="card-tag" style="margin-bottom:8px;">${icon} ${item.department}</div>
                <div class="card-title">${item.summary || item.title_zh || ''}</div>
                <div class="card-rule"></div>
                <div class="card-excerpt">${item.title_zh || ''}</div>
              </div>
            </a>`;
        });

        grid.innerHTML = html;
        section.style.display = '';
      })
      .catch(() => {});
  }

  function stars(n) {
    n = n || 0;
    return `<span class="star-filled">${'★'.repeat(n)}</span><span class="star-empty">${'☆'.repeat(Math.max(0, 5 - n))}</span>`;
  }

  function render(d) {
    const p = d.paper || {};
    const rating = d.rating || {};
    const design = d.design || {};
    const ver = d.verification || {};

    document.title = `${p.title_zh || '醫學新知'} — 雲端知識誌`;

    const verified = ver.pmid_checked && ver.title_matched && ver.date_in_range;

    const html = `
      <!-- ARTICLE HEADER -->
      <div class="article-head">
        <div class="article-eyebrow">
          ${d.department || '內科'} · ${d.date || ''} ${d.time || ''}
        </div>
        <h1 class="article-title-zh">${p.title_zh || '—'}</h1>
        <div class="article-title-en">${p.title_en || ''}</div>
        <span class="ai-badge">AI 翻譯 · 請人工校對</span>
        <div class="article-meta">
          <span class="meta-pill">${p.journal || '—'}</span>
          <span class="meta-pill">${p.published || '—'}</span>
          <span class="meta-pill">${design.type || '—'}</span>
          ${verified ? '<span class="meta-pill verified">PMID 已驗證</span>' : ''}
        </div>
      </div>

      <!-- ARTICLE BODY -->
      <div class="article-body">

        <!-- 期刊資訊 -->
        <div class="section-block">
          <div class="section-head">Journal Information</div>
          <div class="section-body">
            <table class="info-table">
              <tr><td>期刊</td><td>${p.journal || '—'}</td></tr>
              <tr><td>影響因子</td><td>${p.impact_factor || '請至 JCR 手動確認'}</td></tr>
              <tr><td>發表日期</td><td>${p.published || '—'}</td></tr>
              <tr><td>PMID</td><td>${p.pmid || '—'}</td></tr>
              <tr><td>原文連結</td><td><a href="${p.url || '#'}" target="_blank" rel="noopener">PubMed →</a></td></tr>
            </table>
            <a class="pubmed-btn" href="${p.url || '#'}" target="_blank" rel="noopener">
              開啟 PubMed 原文 →
            </a>
          </div>
        </div>

        <!-- 研究設計 -->
        <div class="section-block">
          <div class="section-head">Study Design</div>
          <div class="section-body">
            <div class="design-type">${design.type || '—'}</div>
            <div class="design-note">${design.note || '—'}</div>
          </div>
        </div>

        <!-- 核心發現 -->
        <div class="section-block">
          <div class="section-head">Key Findings</div>
          <div class="section-body">
            <ul class="point-list">
              ${(d.findings || []).map((f, i) =>
                `<li class="point-item">
                  <span class="point-marker">${String(i+1).padStart(2,'0')}</span>
                  <span>${f}</span>
                </li>`
              ).join('')}
            </ul>
          </div>
        </div>

        <!-- 臨床意義 -->
        <div class="section-block">
          <div class="section-head">Clinical Significance</div>
          <div class="section-body">
            <ul class="point-list">
              ${(d.clinical_points || []).map((c, i) =>
                `<li class="point-item">
                  <span class="point-marker">${String(i+1).padStart(2,'0')}</span>
                  <span>${c}</span>
                </li>`
              ).join('')}
            </ul>
          </div>
        </div>

        <!-- 關鍵詞 & 評分 -->
        <div class="two-col">
          <div class="section-block">
            <div class="section-head">Keywords</div>
            <div class="section-body">
              <div class="keyword-list">
                ${(d.keywords || []).map(k => `<span class="keyword-tag">${k}</span>`).join('')}
              </div>
            </div>
          </div>
          <div class="section-block">
            <div class="section-head">Rating</div>
            <div class="section-body">
              <div class="rating-stars">${stars(rating.stars)}</div>
              <div class="rating-reason">${rating.reason || '—'}</div>
            </div>
          </div>
        </div>

        <!-- 注意事項 -->
        <div class="notice-block">
          <strong>使用注意</strong><br>
          本摘要由 AI 自動整理，僅供參考，不構成醫療建議。<br>
          中文翻譯為機器翻譯，請人工校對後再引用。<br>
          Impact Factor 請至 <a href="https://jcr.clarivate.com" target="_blank">JCR</a> 或 Scimago 手動查詢。<br>
          建議閱讀 <a href="${p.url || '#'}" target="_blank">PubMed 原文 Abstract</a> 確認所有數據。
        </div>

      </div>
    `;

    document.getElementById('page-content').innerHTML = html;
  }
</script>

<button id="back-to-top" aria-label="回到頂部" title="回到頂部">↑</button>
<script>
(function(){
  const btn = document.getElementById('back-to-top');
  window.addEventListener('scroll', () => {
    btn.classList.toggle('visible', window.scrollY > 400);
  });
  btn.addEventListener('click', () => {
    window.scrollTo({ top: 0, behavior: 'smooth' });
  });
})();
</script>

<script>
(function(){
  let allKeys = [];
  const params = new URLSearchParams(window.location.search);
  const currentKey = params.get('d') || '';

  fetch('../medical.json')
    .then(r => r.json())
    .then(data => {
      const items = Array.isArray(data) ? data : [];
      allKeys = items.map(item => item.filename.replace('.json', ''));

      const idx = allKeys.indexOf(currentKey);
      const hint = document.getElementById('nav-hint');
      if (hint && idx !== -1) {
        hint.style.display = '';
        const prev = document.getElementById('nav-prev');
        const next = document.getElementById('nav-next');
        if (idx >= allKeys.length - 1) {
          prev.classList.add('disabled');
        } else {
          prev.onclick = () => { window.location.href = './viewer.html?d=' + encodeURIComponent(allKeys[idx + 1]); };
        }
        if (idx <= 0) {
          next.classList.add('disabled');
        } else {
          next.onclick = () => { window.location.href = './viewer.html?d=' + encodeURIComponent(allKeys[idx - 1]); };
        }
      }
    })
    .catch(() => {});

  document.addEventListener('keydown', (e) => {
    if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
    if (allKeys.length === 0) return;
    const idx = allKeys.indexOf(currentKey);
    if (idx === -1) return;
    if (e.key === 'ArrowLeft' && idx < allKeys.length - 1) {
      window.location.href = './viewer.html?d=' + encodeURIComponent(allKeys[idx + 1]);
    } else if (e.key === 'ArrowRight' && idx > 0) {
      window.location.href = './viewer.html?d=' + encodeURIComponent(allKeys[idx - 1]);
    }
  });
})();
</script>
<script src="../assets/guide.js"></script>
</body>
</html>
