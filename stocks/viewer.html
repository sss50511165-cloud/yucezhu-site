<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>股市摘要 — 雲端知識誌</title>
<link rel="stylesheet" href="../assets/theme.css">
<style>
  .page-wrap {
    position: relative;
    z-index: 1;
    max-width: 680px;
    margin: 0 auto;
    padding: 0 28px 80px;
    background: var(--bg-primary);
  }

  /* ── NAV BREADCRUMB ── */
  .top-nav {
    padding: 20px 0 0;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .back-link {
    font-family: 'Cormorant Garamond', serif;
    font-size: 13px;
    font-style: italic;
    letter-spacing: 1px;
    color: var(--text-tertiary);
    text-decoration: none;
    transition: color 0.3s cubic-bezier(0.25, 0.1, 0.25, 1);
  }

  .back-link:hover { color: var(--accent); }

  .nav-sep {
    font-family: 'Cormorant Garamond', serif;
    color: var(--text-tertiary);
    opacity: 0.4;
  }

  #nav-date {
    font-family: 'Cormorant Garamond', serif;
    font-size: 11px;
    font-style: italic;
    letter-spacing: 2px;
    color: var(--text-tertiary);
  }

  /* ── HEADER ── */
  header {
    padding: 44px 0 36px;
    border-bottom: 0.5px solid var(--border-color);
    display: grid;
    grid-template-columns: 1fr auto;
    align-items: end;
    gap: 24px;
    animation: fadeUp 0.7s cubic-bezier(0.25, 0.1, 0.25, 1) both;
  }

  .header-eyebrow {
    font-family: 'Cormorant Garamond', serif;
    font-size: 11px;
    font-style: italic;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 14px;
  }

  header h1 {
    font-family: 'Playfair Display', 'Noto Serif TC', serif;
    font-size: clamp(28px, 4.5vw, 48px);
    line-height: 1.15;
    color: var(--text-primary);
    font-weight: 500;
  }

  header h1 span {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 400;
    font-style: italic;
    color: var(--accent);
  }

  .header-meta { text-align: right; }

  .header-date {
    font-family: 'Cormorant Garamond', serif;
    font-size: 13px;
    font-style: italic;
    color: var(--text-secondary);
    line-height: 2;
    letter-spacing: 1px;
  }

  .live-dot {
    display: inline-block;
    width: 6px; height: 6px;
    background: var(--up);
    border-radius: 50%;
    margin-right: 6px;
    animation: pulse 2s infinite;
  }

  /* ── SUMMARY BANNER ── */
  .summary-banner {
    margin: 24px 0 0;
    padding: 18px 22px;
    background: rgba(201, 147, 91, 0.06);
    border: 0.5px solid rgba(201, 147, 91, 0.2);
    border-left: 2px solid var(--accent);
    border-radius: 0 4px 4px 0;
    font-family: 'LXGW WenKai TC', 'Noto Serif TC', serif;
    font-size: 15px;
    font-weight: 300;
    color: var(--text-primary);
    line-height: 1.9;
    animation: fadeUp 0.7s 0.05s cubic-bezier(0.25, 0.1, 0.25, 1) both;
  }

  /* ── INDEX STRIP ── */
  .index-strip {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 1px;
    background: var(--border-color);
    margin: 28px 0;
    border: 0.5px solid var(--border-color);
    border-radius: 4px;
    overflow: hidden;
    animation: fadeUp 0.7s 0.1s cubic-bezier(0.25, 0.1, 0.25, 1) both;
  }

  .index-card {
    background: var(--bg-card);
    padding: 22px 24px;
    position: relative;
    overflow: hidden;
  }

  .index-card::after {
    content: '';
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 2px;
    transform: scaleX(0);
    transform-origin: left;
    transition: transform 0.9s 0.4s cubic-bezier(0.25, 0.1, 0.25, 1);
  }

  .index-card.up-card::after   { background: var(--up); }
  .index-card.down-card::after { background: var(--down); }
  .index-card.loaded::after    { transform: scaleX(1); }

  .index-name {
    font-family: 'Cormorant Garamond', serif;
    font-size: 10px;
    font-style: italic;
    letter-spacing: 2px;
    color: var(--text-secondary);
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  .index-value {
    font-family: 'Playfair Display', serif;
    font-size: 22px;
    font-weight: 500;
  }

  .index-desc {
    font-family: 'Noto Serif TC', serif;
    font-size: 11px;
    font-weight: 300;
    color: var(--text-secondary);
    margin-top: 6px;
  }

  /* ── SECTION ── */
  section {
    margin-top: 48px;
    animation: fadeUp 0.7s cubic-bezier(0.25, 0.1, 0.25, 1) both;
  }

  section:nth-child(3) { animation-delay: 0.15s; }
  section:nth-child(4) { animation-delay: 0.20s; }
  section:nth-child(5) { animation-delay: 0.25s; }
  section:nth-child(6) { animation-delay: 0.30s; }
  section:nth-child(7) { animation-delay: 0.35s; }

  .section-label {
    font-family: 'Cormorant Garamond', serif;
    font-size: 11px;
    font-style: italic;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 20px;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .section-label::after {
    content: '';
    flex: 1;
    height: 0.5px;
    background: var(--border-color);
  }

  /* ── EVENT CARDS ── */
  .events-grid { display: grid; gap: 2px; }

  .event-item {
    display: grid;
    grid-template-columns: 48px 1fr;
    background: var(--bg-card);
    border: 0.5px solid var(--border-color);
    border-radius: 4px;
    overflow: hidden;
    transition: border-color 0.4s cubic-bezier(0.25, 0.1, 0.25, 1);
  }

  .event-item:hover {
    border-color: var(--border-hover);
  }

  .event-item:hover .event-icon-col {
    background: rgba(201, 147, 91, 0.08);
  }

  .event-icon-col {
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    background: rgba(34, 28, 21, 0.5);
    transition: background 0.4s cubic-bezier(0.25, 0.1, 0.25, 1);
  }

  .event-body { padding: 16px 20px; }

  .event-title {
    font-family: 'LXGW WenKai TC', 'Noto Serif TC', serif;
    font-size: 16px;
    font-weight: 400;
    color: var(--text-primary);
    margin-bottom: 4px;
  }

  .event-detail {
    font-family: 'LXGW WenKai TC', 'Noto Serif TC', serif;
    font-size: 15px;
    font-weight: 400;
    color: var(--text-secondary);
    line-height: 2.0;
  }

  .event-meta {
    margin-top: 6px;
    font-family: 'Cormorant Garamond', serif;
    font-size: 12px;
    font-style: italic;
    color: var(--text-secondary);
    letter-spacing: 1px;
  }

  /* ── TW STOCK ── */
  .tw-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
  }

  .tw-main {
    background: var(--bg-card);
    border: 0.5px solid var(--border-color);
    border-radius: 4px;
    padding: 24px;
    grid-column: 1 / -1;
    display: flex;
    align-items: center;
    gap: 32px;
  }

  .tw-big-num {
    font-family: 'Playfair Display', serif;
    font-size: 44px;
    font-weight: 500;
    line-height: 1;
    white-space: nowrap;
  }

  .tw-big-label {
    font-family: 'Noto Serif TC', serif;
    font-size: 12px;
    font-weight: 300;
    color: var(--text-tertiary);
    margin-top: 6px;
  }

  .tw-divider {
    width: 0.5px;
    height: 60px;
    background: var(--border-color);
    flex-shrink: 0;
  }

  .tw-sub-text {
    font-family: 'LXGW WenKai TC', 'Noto Serif TC', serif;
    font-size: 15px;
    font-weight: 400;
    color: var(--text-secondary);
    line-height: 2.0;
  }

  .tw-sub-text strong {
    color: var(--text-primary);
    font-weight: 400;
  }

  .sector-card {
    background: var(--bg-card);
    border: 0.5px solid var(--border-color);
    border-radius: 4px;
    padding: 18px 20px;
    position: relative;
    overflow: hidden;
  }

  .sector-num {
    font-family: 'Cormorant Garamond', serif;
    font-size: 28px;
    font-weight: 300;
    font-style: italic;
    color: var(--accent);
    position: absolute;
    top: 14px; right: 18px;
    opacity: 0.12;
  }

  .sector-name {
    font-family: 'Noto Serif TC', serif;
    font-size: 14px;
    font-weight: 400;
    margin-bottom: 4px;
    padding-right: 32px;
  }

  /* ── RISK ── */
  .risk-list { display: grid; gap: 10px; }

  .risk-item {
    display: flex;
    align-items: flex-start;
    gap: 14px;
    padding: 16px 20px;
    background: var(--bg-card);
    border: 0.5px solid var(--border-color);
    border-radius: 4px;
    border-left: 2px solid var(--warn);
  }

  .risk-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--warn);
    margin-top: 7px;
    flex-shrink: 0;
  }

  .risk-text {
    font-family: 'LXGW WenKai TC', 'Noto Serif TC', serif;
    font-size: 15px;
    font-weight: 400;
    line-height: 2.0;
    color: var(--text-secondary);
  }

  /* ── TOMORROW ── */
  .tomorrow-list { display: grid; gap: 8px; }

  .tomorrow-item {
    display: flex;
    align-items: flex-start;
    gap: 14px;
    padding: 14px 20px;
    background: var(--bg-card);
    border: 0.5px solid var(--border-color);
    border-radius: 4px;
    font-family: 'LXGW WenKai TC', 'Noto Serif TC', serif;
    font-size: 15px;
    font-weight: 300;
    color: var(--text-secondary);
    line-height: 1.9;
  }

  .tomorrow-arrow {
    color: var(--accent);
    font-family: 'Cormorant Garamond', serif;
    flex-shrink: 0;
    margin-top: 2px;
  }

  /* ── FOOTER ── */
  .viewer-footer {
    margin-top: 64px;
    padding-top: 24px;
    border-top: 0.5px solid var(--border-color);
    display: flex;
    flex-wrap: wrap;
    justify-content: space-between;
    align-items: center;
    gap: 16px;
    animation: fadeUp 0.7s 0.4s cubic-bezier(0.25, 0.1, 0.25, 1) both;
  }

  .footer-sources {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }

  .source-chip {
    font-family: 'Cormorant Garamond', serif;
    font-size: 11px;
    font-style: italic;
    letter-spacing: 1px;
    color: var(--text-tertiary);
    border: 0.5px solid var(--border-color);
    border-radius: 2px;
    padding: 4px 12px;
    text-decoration: none;
    transition: border-color 0.3s, color 0.3s;
  }

  .source-chip:hover {
    border-color: var(--accent);
    color: var(--accent);
  }

  .footer-right {
    font-family: 'Cormorant Garamond', serif;
    font-size: 11px;
    font-style: italic;
    color: var(--text-secondary);
    letter-spacing: 2px;
    text-align: right;
    line-height: 2;
  }

  .footer-generated {
    font-size: 10px;
    opacity: 0.6;
  }

  /* ── RESPONSIVE ── */
  @media (max-width: 600px) {
    .index-strip { grid-template-columns: 1fr; }
    .tw-grid { grid-template-columns: 1fr; }
    .tw-main { flex-direction: column; align-items: flex-start; gap: 16px; }
    .tw-divider { width: 60px; height: 0.5px; }
    header { grid-template-columns: 1fr; }
    .header-meta { text-align: left; }
  }
</style>
</head>
<body>
<div class="page-wrap">

  <div class="top-nav">
    <a class="back-link" href="./index.html">← 股市摘要</a>
    <span class="nav-sep">/</span>
    <span id="nav-date">—</span>
  </div>

  <div id="main-content">
    <div class="center-msg">
      <div class="loading-dot"></div>
      <span>載入摘要中...</span>
    </div>
  </div>

</div>

<script>
  const params = new URLSearchParams(location.search);
  const date = params.get('d');

  if (!date) {
    document.getElementById('main-content').innerHTML =
      '<div class="center-msg"><span>未指定日期</span><a class="err-link" href="./index.html">← 返回股市列表</a></div>';
  } else {
    document.getElementById('nav-date').textContent = date;
    document.title = `股市摘要 ${date} — 雲端知識誌`;
    fetch(`./${date}.json`)
      .then(r => { if (!r.ok) throw r.status; return r.json(); })
      .then(render)
      .catch(() => {
        document.getElementById('main-content').innerHTML =
          `<div class="center-msg"><span>找不到 ${date} 的資料</span><a class="err-link" href="./index.html">← 返回股市列表</a></div>`;
      });
  }

  function arrow(val) {
    if (!val) return '';
    return val.startsWith('+') ? '▲ ' : val.startsWith('-') ? '▼ ' : '';
  }

  function isUp(val)   { return val && val.startsWith('+'); }
  function isDown(val) { return val && val.startsWith('-'); }

  function render(d) {
    const us = d.us || {};
    const tw = d.tw || {};
    const events  = d.events  || [];
    const risks   = d.risks   || [];
    const tomorrow = d.tomorrow || [];
    const sources = d.sources || [];
    const sectors = tw.sectors || [];

    const indices = [
      { name: 'Dow Jones',  val: us.dow,    desc: '道瓊工業指數' },
      { name: 'Nasdaq',     val: us.nasdaq, desc: '納斯達克綜合' },
      { name: 'S&P 500',   val: us.sp500,  desc: '標準普爾五百' },
    ];

    const indexHtml = indices.map(idx => {
      const up = isUp(idx.val), dn = isDown(idx.val);
      const cls = up ? 'up-card' : dn ? 'down-card' : '';
      const valCls = up ? 'up' : dn ? 'down' : '';
      return `
        <div class="index-card ${cls}">
          <div class="index-name">${idx.name}</div>
          <div class="index-value ${valCls}">${arrow(idx.val)}${idx.val || '—'}</div>
          <div class="index-desc">${idx.desc}</div>
        </div>`;
    }).join('');

    const evHtml = events.map(e => `
      <div class="event-item">
        <div class="event-icon-col">${e.icon || '📌'}</div>
        <div class="event-body">
          <div class="event-title">${e.title}</div>
          <div class="event-detail">${e.detail}</div>
          ${e.meta ? `<div class="event-meta">${e.meta}</div>` : ''}
        </div>
      </div>`).join('');

    const sectorHtml = sectors.map((s, i) => `
      <div class="sector-card">
        <div class="sector-num">0${i + 1}</div>
        <div class="sector-name">${s}</div>
      </div>`).join('');

    const riskHtml = risks.map(r => `
      <div class="risk-item">
        <div class="risk-dot"></div>
        <div class="risk-text">${r}</div>
      </div>`).join('');

    const tmrHtml = tomorrow.map(t => `
      <div class="tomorrow-item">
        <span class="tomorrow-arrow">→</span>
        <span>${t}</span>
      </div>`).join('');

    const srcHtml = sources.map(s =>
      `<span class="source-chip">${s}</span>`).join('');

    const twUp = isUp(tw.change);
    const twDn = isDown(tw.change);
    const twNumCls = twUp ? 'up' : twDn ? 'down' : '';

    document.getElementById('main-content').innerHTML = `

      <header>
        <div>
          <div class="header-eyebrow">Market Briefing · Summary</div>
          <h1>股市摘要<br><span>${d.date || date}</span></h1>
        </div>
        <div class="header-meta">
          <div class="header-date">
            <span class="live-dot"></span>UTC+8<br>
            ${d.generated ? `產出時間<br>${d.generated}<br><br>` : ''}
            ${sources.slice(0,3).join(' · ')}
          </div>
        </div>
      </header>

      ${d.summary ? `<div class="summary-banner">${d.summary}</div>` : ''}

      <div class="index-strip" id="indexStrip">${indexHtml}</div>

      <section>
        <div class="section-label">重大國際財經事件</div>
        <div class="events-grid">${evHtml || '<div style="color:var(--text-tertiary);font-size:13px;padding:12px 0;font-style:italic">本日無重大事件記錄</div>'}</div>
      </section>

      <section>
        <div class="section-label">台股今日影響分析</div>
        <div class="tw-grid">
          <div class="tw-main">
            <div>
              <div class="tw-big-num ${twNumCls}">${arrow(tw.change)}${tw.change || '—'}</div>
              <div class="tw-big-label">加權指數 ${tw.points ? tw.points + ' 點' : ''}</div>
            </div>
            <div class="tw-divider"></div>
            <div class="tw-sub-text">${tw.note || '—'}</div>
          </div>
          ${sectorHtml}
        </div>
      </section>

      ${riskHtml ? `
      <section>
        <div class="section-label">今日風險事件</div>
        <div class="risk-list">${riskHtml}</div>
      </section>` : ''}

      ${tmrHtml ? `
      <section>
        <div class="section-label">明日觀察重點</div>
        <div class="tomorrow-list">${tmrHtml}</div>
      </section>` : ''}

      <div class="viewer-footer">
        <div class="footer-sources">${srcHtml}</div>
        <div class="footer-right">
          Market Briefing · Summary<br>
          <span class="footer-generated">${d.generated || ''}</span>
        </div>
      </div>`;

    setTimeout(() => {
      document.querySelectorAll('.index-card').forEach(c => c.classList.add('loaded'));
    }, 200);
  }
</script>
</body>
</html>
