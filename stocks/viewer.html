<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>股市摘要 — 雲端知識誌</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=IBM+Plex+Mono:wght@400;600&family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #08090d;
    --surface: #0f1117;
    --surface2: #161820;
    --border: #1e2130;
    --gold: #c9a84c;
    --gold-light: #f0c96a;
    --gold-dim: rgba(201,168,76,0.12);
    --up: #3dd68c;
    --down: #f0644a;
    --warn-y: #f5c842;
    --warn-o: #f59b42;
    --text: #e8e9ef;
    --text-muted: #6b7190;
    --text-dim: #3a3f5c;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans TC', sans-serif;
    font-weight: 300;
    min-height: 100vh;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 0;
    opacity: 0.6;
  }

  .page-wrap {
    position: relative;
    z-index: 1;
    max-width: 960px;
    margin: 0 auto;
    padding: 0 24px 80px;
  }

  /* ── NAV ── */
  .top-nav {
    padding: 20px 0 0;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .back-link {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--text-muted);
    text-decoration: none;
    transition: color 0.2s;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .back-link:hover { color: var(--gold); }
  .nav-sep { font-family: monospace; color: var(--text-dim); }

  /* ── HEADER ── */
  header {
    padding: 40px 0 36px;
    border-bottom: 1px solid var(--border);
    display: grid;
    grid-template-columns: 1fr auto;
    align-items: end;
    gap: 24px;
    animation: fadeUp 0.7s ease both;
  }

  .header-eyebrow {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 12px;
  }

  header h1 {
    font-family: 'DM Serif Display', serif;
    font-size: clamp(32px, 5vw, 52px);
    line-height: 1.1;
    color: var(--text);
    font-weight: 400;
  }

  header h1 span { color: var(--gold); font-style: italic; }

  .header-meta { text-align: right; }

  .header-date {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    color: var(--text-muted);
    line-height: 2;
  }

  .live-dot {
    display: inline-block;
    width: 7px; height: 7px;
    background: var(--up);
    border-radius: 50%;
    margin-right: 6px;
    animation: pulse 2s infinite;
  }

  /* ── SUMMARY BANNER ── */
  .summary-banner {
    margin: 24px 0 0;
    padding: 16px 20px;
    background: var(--gold-dim);
    border: 1px solid rgba(201,168,76,0.25);
    border-radius: 3px;
    font-size: 14px;
    color: var(--gold-light);
    line-height: 1.6;
    animation: fadeUp 0.7s 0.05s ease both;
  }

  /* ── INDEX STRIP ── */
  .index-strip {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 1px;
    background: var(--border);
    margin: 28px 0;
    border: 1px solid var(--border);
    border-radius: 4px;
    overflow: hidden;
    animation: fadeUp 0.7s 0.1s ease both;
  }

  .index-card {
    background: var(--surface);
    padding: 20px 24px;
    position: relative;
    overflow: hidden;
  }

  .index-card::after {
    content: '';
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 2px;
    transform: scaleX(0);
    transform-origin: left;
    transition: transform 0.9s 0.4s ease;
  }

  .index-card.up-card::after  { background: var(--up); }
  .index-card.down-card::after { background: var(--down); }
  .index-card.loaded::after   { transform: scaleX(1); }

  .index-name {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.15em;
    color: var(--text-muted);
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  .index-value {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 22px;
    font-weight: 600;
  }
  .index-value.up   { color: var(--up); }
  .index-value.down { color: var(--down); }

  .index-desc {
    font-size: 11px;
    color: var(--text-muted);
    margin-top: 6px;
    line-height: 1.5;
  }

  /* ── SECTION ── */
  section {
    margin-top: 48px;
    animation: fadeUp 0.7s ease both;
  }

  section:nth-child(3) { animation-delay: 0.15s; }
  section:nth-child(4) { animation-delay: 0.20s; }
  section:nth-child(5) { animation-delay: 0.25s; }
  section:nth-child(6) { animation-delay: 0.30s; }
  section:nth-child(7) { animation-delay: 0.35s; }

  .section-label {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 20px;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .section-label::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  /* ── EVENT CARDS ── */
  .events-grid { display: grid; gap: 2px; }

  .event-item {
    display: grid;
    grid-template-columns: 48px 1fr;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 3px;
    overflow: hidden;
    transition: border-color 0.2s;
  }

  .event-item:hover { border-color: rgba(201,168,76,0.3); }
  .event-item:hover .event-icon-col { background: var(--gold-dim); }

  .event-icon-col {
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    background: var(--surface2);
    transition: background 0.2s;
  }

  .event-body { padding: 14px 18px; }

  .event-title {
    font-size: 14px;
    font-weight: 500;
    color: var(--text);
    margin-bottom: 4px;
  }

  .event-detail {
    font-size: 12px;
    color: var(--text-muted);
    line-height: 1.7;
  }

  .event-meta {
    margin-top: 6px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    color: var(--text-dim);
    letter-spacing: 0.06em;
  }

  /* ── TW STOCK ── */
  .tw-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
  }

  .tw-main {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 24px;
    grid-column: 1 / -1;
    display: flex;
    align-items: center;
    gap: 32px;
  }

  .tw-big-num {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 44px;
    font-weight: 600;
    line-height: 1;
    white-space: nowrap;
  }
  .tw-big-num.up   { color: var(--up); }
  .tw-big-num.down { color: var(--down); }

  .tw-big-label {
    font-size: 12px;
    color: var(--text-muted);
    margin-top: 6px;
  }

  .tw-divider {
    width: 1px;
    height: 60px;
    background: var(--border);
    flex-shrink: 0;
  }

  .tw-sub-text {
    font-size: 13px;
    color: var(--text-muted);
    line-height: 1.9;
  }

  .tw-sub-text strong { color: var(--text); font-weight: 500; }

  .sector-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 18px 20px;
    position: relative;
    overflow: hidden;
  }

  .sector-num {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 28px;
    font-weight: 600;
    color: var(--gold);
    position: absolute;
    top: 14px; right: 18px;
    opacity: 0.15;
  }

  .sector-name {
    font-size: 14px;
    font-weight: 500;
    margin-bottom: 6px;
    padding-right: 32px;
  }

  .sector-desc {
    font-size: 12px;
    color: var(--text-muted);
    line-height: 1.6;
  }

  /* ── RISK ── */
  .risk-list { display: grid; gap: 10px; }

  .risk-item {
    display: flex;
    align-items: flex-start;
    gap: 14px;
    padding: 16px 18px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 3px;
    border-left: 3px solid transparent;
  }

  .risk-item:nth-child(odd)  { border-left-color: var(--warn-y); }
  .risk-item:nth-child(even) { border-left-color: var(--warn-o); }

  .risk-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    margin-top: 5px;
    flex-shrink: 0;
  }

  .risk-item:nth-child(odd) .risk-dot  { background: var(--warn-y); }
  .risk-item:nth-child(even) .risk-dot { background: var(--warn-o); }

  .risk-text {
    font-size: 13px;
    line-height: 1.7;
    color: var(--text-muted);
  }

  /* ── TOMORROW ── */
  .tomorrow-list { display: grid; gap: 8px; }

  .tomorrow-item {
    display: flex;
    align-items: flex-start;
    gap: 14px;
    padding: 14px 18px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 3px;
    font-size: 13px;
    color: var(--text-muted);
    line-height: 1.7;
  }

  .tomorrow-arrow {
    color: var(--gold);
    font-family: monospace;
    flex-shrink: 0;
    margin-top: 1px;
  }

  /* ── FOOTER ── */
  footer {
    margin-top: 64px;
    padding-top: 24px;
    border-top: 1px solid var(--border);
    display: flex;
    flex-wrap: wrap;
    justify-content: space-between;
    align-items: center;
    gap: 16px;
    animation: fadeUp 0.7s 0.4s ease both;
  }

  .footer-sources { display: flex; flex-wrap: wrap; gap: 8px; }

  .source-chip {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.08em;
    color: var(--text-muted);
    border: 1px solid var(--border);
    border-radius: 2px;
    padding: 4px 10px;
    text-decoration: none;
    transition: border-color 0.2s, color 0.2s;
  }

  .source-chip:hover { border-color: var(--gold); color: var(--gold); }

  .footer-right {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    color: var(--text-dim);
    letter-spacing: 0.12em;
    text-align: right;
    line-height: 2;
  }

  /* ── ERROR / LOADING ── */
  .center-msg {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 50vh;
    gap: 16px;
    color: var(--text-muted);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    letter-spacing: 0.1em;
  }
  .loading-dot {
    width: 8px; height: 8px;
    background: var(--gold);
    border-radius: 50%;
    animation: pulse 1s infinite;
  }
  .err-link { color: var(--gold); text-decoration: none; }
  .err-link:hover { text-decoration: underline; }

  /* ── ANIMATIONS ── */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.2; }
  }

  /* ── RESPONSIVE ── */
  @media (max-width: 600px) {
    .index-strip { grid-template-columns: 1fr; }
    .tw-grid { grid-template-columns: 1fr; }
    .tw-main { flex-direction: column; align-items: flex-start; gap: 16px; }
    .tw-divider { width: 60px; height: 1px; }
    header { grid-template-columns: 1fr; }
    .header-meta { text-align: left; }
  }
</style>
</head>
<body>
<div class="page-wrap">

  <div class="top-nav">
    <a class="back-link" href="./index.html">← 股市摘要</a>
    <span class="nav-sep">/</span>
    <span style="font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:.12em;color:var(--text-dim)" id="nav-date">—</span>
  </div>

  <div id="main-content">
    <div class="center-msg">
      <div class="loading-dot"></div>
      <span>載入摘要中...</span>
    </div>
  </div>

</div>

<script>
  const params = new URLSearchParams(location.search);
  const date = params.get('d');

  if (!date) {
    document.getElementById('main-content').innerHTML =
      '<div class="center-msg"><span>未指定日期</span><a class="err-link" href="./index.html">← 返回股市列表</a></div>';
  } else {
    document.getElementById('nav-date').textContent = date;
    document.title = `股市摘要 ${date} — 雲端知識誌`;
    fetch(`./${date}.json`)
      .then(r => { if (!r.ok) throw r.status; return r.json(); })
      .then(render)
      .catch(() => {
        document.getElementById('main-content').innerHTML =
          `<div class="center-msg"><span>找不到 ${date} 的資料</span><a class="err-link" href="./index.html">← 返回股市列表</a></div>`;
      });
  }

  function arrow(val) {
    if (!val) return '';
    return val.startsWith('+') ? '▲ ' : val.startsWith('-') ? '▼ ' : '';
  }

  function isUp(val)   { return val && val.startsWith('+'); }
  function isDown(val) { return val && val.startsWith('-'); }

  function render(d) {
    const us = d.us || {};
    const tw = d.tw || {};
    const events  = d.events  || [];
    const risks   = d.risks   || [];
    const tomorrow = d.tomorrow || [];
    const sources = d.sources || [];
    const sectors = tw.sectors || [];

    // ── Index cards ──
    const indices = [
      { name: 'Dow Jones',  val: us.dow,    desc: '道瓊工業指數' },
      { name: 'Nasdaq',     val: us.nasdaq, desc: '納斯達克綜合' },
      { name: 'S&P 500',   val: us.sp500,  desc: '標準普爾五百' },
    ];

    const indexHtml = indices.map(idx => {
      const up = isUp(idx.val), dn = isDown(idx.val);
      const cls = up ? 'up-card' : dn ? 'down-card' : '';
      const valCls = up ? 'up' : dn ? 'down' : '';
      return `
        <div class="index-card ${cls}">
          <div class="index-name">${idx.name}</div>
          <div class="index-value ${valCls}">${arrow(idx.val)}${idx.val || '—'}</div>
          <div class="index-desc">${idx.desc}</div>
        </div>`;
    }).join('');

    // ── Events ──
    const evHtml = events.map(e => `
      <div class="event-item">
        <div class="event-icon-col">${e.icon || '📌'}</div>
        <div class="event-body">
          <div class="event-title">${e.title}</div>
          <div class="event-detail">${e.detail}</div>
          ${e.meta ? `<div class="event-meta">${e.meta}</div>` : ''}
        </div>
      </div>`).join('');

    // ── TW sectors ──
    const sectorHtml = sectors.map((s, i) => `
      <div class="sector-card">
        <div class="sector-num">0${i + 1}</div>
        <div class="sector-name">${s}</div>
      </div>`).join('');

    // ── Risks ──
    const riskHtml = risks.map(r => `
      <div class="risk-item">
        <div class="risk-dot"></div>
        <div class="risk-text">${r}</div>
      </div>`).join('');

    // ── Tomorrow ──
    const tmrHtml = tomorrow.map(t => `
      <div class="tomorrow-item">
        <span class="tomorrow-arrow">→</span>
        <span>${t}</span>
      </div>`).join('');

    // ── Sources ──
    const srcHtml = sources.map(s =>
      `<span class="source-chip">${s}</span>`).join('');

    const twUp = isUp(tw.change);
    const twDn = isDown(tw.change);
    const twNumCls = twUp ? 'up' : twDn ? 'down' : '';

    document.getElementById('main-content').innerHTML = `

      <header>
        <div>
          <div class="header-eyebrow">Financial Insights · Market Summary</div>
          <h1>股市摘要<br><span>${d.date || date}</span></h1>
        </div>
        <div class="header-meta">
          <div class="header-date">
            <span class="live-dot"></span>UTC+8<br>
            ${d.generated ? `產出時間<br>${d.generated}<br><br>` : ''}
            ${sources.slice(0,3).join(' · ')}
          </div>
        </div>
      </header>

      ${d.summary ? `<div class="summary-banner">${d.summary}</div>` : ''}

      <div class="index-strip" id="indexStrip">${indexHtml}</div>

      <section>
        <div class="section-label">重大國際財經事件</div>
        <div class="events-grid">${evHtml || '<div style="color:var(--text-dim);font-size:13px;padding:12px 0">本日無重大事件記錄</div>'}</div>
      </section>

      <section>
        <div class="section-label">台股今日影響分析</div>
        <div class="tw-grid">
          <div class="tw-main">
            <div>
              <div class="tw-big-num ${twNumCls}">${arrow(tw.change)}${tw.change || '—'}</div>
              <div class="tw-big-label">加權指數 ${tw.points ? tw.points + ' 點' : ''}</div>
            </div>
            <div class="tw-divider"></div>
            <div class="tw-sub-text">${tw.note || '—'}</div>
          </div>
          ${sectorHtml}
        </div>
      </section>

      ${riskHtml ? `
      <section>
        <div class="section-label">今日風險事件</div>
        <div class="risk-list">${riskHtml}</div>
      </sectio
