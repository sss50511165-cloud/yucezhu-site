<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>股市摘要 — 雲端知識誌</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=IBM+Plex+Mono:wght@400;600&family=Noto+Sans+TC:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #08090d;
    --surface: #0f1117;
    --surface2: #13151f;
    --border: #1a1d2c;
    --border2: #252840;
    --gold: #c9a84c;
    --gold-light: #f0c96a;
    --gold-dim: rgba(201,168,76,0.08);
    --gold-dim2: rgba(201,168,76,0.15);
    --up: #3dd68c;
    --down: #f04438;
    --text: #e2e4f0;
    --muted: #5a6080;
    --dim: #2a2d40;
  }

  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  html { scroll-behavior: smooth; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans TC', sans-serif;
    font-weight: 300;
    min-height: 100vh;
  }

  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 999;
    opacity: 0.5;
  }

  /* HEADER */
  header {
    padding: 0 32px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 64px;
  }
  .logo { display: flex; align-items: center; gap: 14px; text-decoration: none; }
  .logo-mark {
    width: 32px; height: 32px;
    border: 1px solid var(--gold);
    display: flex; align-items: center; justify-content: center;
    position: relative;
  }
  .logo-mark::before { content: ''; position: absolute; inset: 3px; background: var(--gold-dim2); }
  .logo-mark span { font-family: 'IBM Plex Mono', monospace; font-size: 11px; font-weight: 600; color: var(--gold); position: relative; }
  .logo-text { font-family: 'DM Serif Display', serif; font-size: 18px; color: var(--text); letter-spacing: 0.02em; }
  .back-link {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.12em;
    color: var(--muted);
    text-decoration: none;
    display: flex; align-items: center; gap: 6px;
    transition: color 0.2s;
  }
  .back-link:hover { color: var(--gold); }

  /* WRAPPER */
  .wrap {
    max-width: 860px;
    margin: 0 auto;
    padding: 48px 32px 80px;
  }

  /* DATE BADGE */
  .date-badge {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 16px;
    display: flex; align-items: center; gap: 12px;
  }
  .date-badge::before { content: ''; width: 24px; height: 1px; background: var(--gold); }

  /* SUMMARY HEADLINE */
  .summary-text {
    font-family: 'DM Serif Display', serif;
    font-size: clamp(24px, 4vw, 38px);
    line-height: 1.2;
    color: var(--text);
    margin-bottom: 40px;
    border-bottom: 1px solid var(--border);
    padding-bottom: 32px;
  }

  /* SECTION */
  .section { margin-bottom: 40px; }
  .section-label {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 16px;
    display: flex; align-items: center; gap: 12px;
  }
  .section-label::after { content: ''; flex: 1; height: 1px; background: var(--border); }

  /* INDEX TABLE */
  .index-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
  }
  .index-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 20px 18px;
  }
  .index-name {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.12em;
    color: var(--muted);
    margin-bottom: 10px;
  }
  .index-val {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 22px;
    font-weight: 600;
  }
  .index-val.up { color: var(--up); }
  .index-val.down { color: var(--down); }

  /* TW BLOCK */
  .tw-block {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 24px;
  }
  .tw-main { display: flex; align-items: baseline; gap: 16px; margin-bottom: 20px; flex-wrap: wrap; }
  .tw-pts {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 28px;
    font-weight: 600;
    color: var(--up);
  }
  .tw-pts.down { color: var(--down); }
  .tw-change {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 14px;
    color: var(--up);
  }
  .tw-change.down { color: var(--down); }
  .tw-note { font-size: 14px; color: var(--muted); line-height: 1.8; margin-bottom: 16px; }
  .sector-list { display: flex; flex-wrap: wrap; gap: 8px; }
  .sector-tag {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.08em;
    color: var(--gold);
    background: var(--gold-dim);
    border: 1px solid var(--gold-dim2);
    border-radius: 2px;
    padding: 4px 12px;
  }

  /* EVENT CARDS */
  .events-list { display: grid; gap: 10px; }
  .event-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 18px 20px;
    display: flex;
    gap: 16px;
    align-items: flex-start;
    transition: border-color 0.2s;
  }
  .event-card:hover { border-color: var(--border2); }
  .event-icon { font-size: 22px; line-height: 1; flex-shrink: 0; margin-top: 2px; }
  .event-body { flex: 1; }
  .event-title { font-size: 15px; font-weight: 500; color: var(--text); margin-bottom: 6px; }
  .event-detail { font-size: 13px; color: var(--muted); line-height: 1.8; margin-bottom: 8px; }
  .event-meta { font-family: 'IBM Plex Mono', monospace; font-size: 10px; color: var(--dim); letter-spacing: 0.08em; }

  /* RISK LIST */
  .risk-list { display: grid; gap: 8px; }
  .risk-item {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    background: rgba(240,68,56,0.06);
    border: 1px solid rgba(240,68,56,0.2);
    border-radius: 4px;
    padding: 14px 16px;
    font-size: 14px;
    color: #f7a09a;
    line-height: 1.6;
  }
  .risk-item::before { content: '⚠'; flex-shrink: 0; }

  /* TOMORROW LIST */
  .tomorrow-list { display: grid; gap: 8px; }
  .tomorrow-item {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 14px 16px;
    font-size: 14px;
    color: var(--text);
    line-height: 1.6;
  }
  .tomorrow-item::before { content: '→'; color: var(--gold); flex-shrink: 0; font-family: monospace; }

  /* SOURCES */
  .sources-row {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-top: 8px;
  }
  .source-chip {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.08em;
    color: var(--muted);
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 2px;
    padding: 4px 10px;
  }

  /* GENERATED */
  .generated {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    color: var(--dim);
    letter-spacing: 0.1em;
    margin-top: 12px;
  }

  /* FOOTER */
  footer {
    border-top: 1px solid var(--border);
    padding: 20px 32px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 12px;
  }
  .footer-left { font-family: 'IBM Plex Mono', monospace; font-size: 10px; letter-spacing: 0.12em; color: var(--dim); }
  .footer-right { font-family: 'IBM Plex Mono', monospace; font-size: 10px; letter-spacing: 0.1em; color: var(--dim); }

  /* ERROR */
  .error-box {
    background: var(--surface);
    border: 1px dashed var(--border2);
    border-radius: 4px;
    padding: 48px;
    text-align: center;
    color: var(--muted);
    font-size: 14px;
    line-height: 2;
  }

  /* LOADING */
  .loading {
    display: flex;
    align-items: center;
    gap: 12px;
    color: var(--muted);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    letter-spacing: 0.1em;
    padding: 48px 0;
    justify-content: center;
  }
  .loading-dot { width: 6px; height: 6px; background: var(--gold); border-radius: 50%; animation: blink 1s infinite; }

  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.2} }
  @keyframes fadeUp { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:translateY(0)} }
  .fade-in { animation: fadeUp 0.5s ease both; }

  @media(max-width:600px) {
    header { padding: 0 16px; }
    .wrap { padding: 32px 16px 60px; }
    .index-grid { grid-template-columns: 1fr; }
    footer { padding: 16px; }
  }
</style>
</head>
<body>

<header>
  <a class="logo" href="../">
    <div class="logo-mark"><span>誌</span></div>
    <span class="logo-text">雲端知識誌</span>
  </a>
  <a class="back-link" href="../">← 返回首頁</a>
</header>

<div class="wrap" id="content">
  <div class="loading"><div class="loading-dot"></div><span>載入摘要中...</span></div>
</div>

<footer>
  <div class="footer-left">© 2026 雲端知識誌 · 每日自動更新</div>
  <div class="footer-right">POWERED BY CLAUDE · HOSTED ON GITHUB PAGES</div>
</footer>

<script>
  // Get date from URL: ?d=2026-04-10
  const params = new URLSearchParams(location.search);
  const date = params.get('d');

  if (!date) {
    document.getElementById('content').innerHTML =
      '<div class="error-box">未指定日期<br><a href="../" style="color:var(--gold)">← 返回首頁</a></div>';
  } else {
    fetch(`./${date}.json`)
      .then(r => { if (!r.ok) throw new Error(r.status); return r.json(); })
      .then(render)
      .catch(() => {
        document.getElementById('content').innerHTML =
          `<div class="error-box">找不到 ${date} 的摘要資料<br><a href="../" style="color:var(--gold)">← 返回首頁</a></div>`;
      });
  }

  function pct(val) {
    if (!val) return { cls: '', text: val || '—' };
    const up = val.startsWith('+');
    const down = val.startsWith('-');
    return { cls: up ? 'up' : down ? 'down' : '', text: val };
  }

  function render(d) {
    document.title = `股市摘要 ${d.date} — 雲端知識誌`;

    const us = d.us || {};
    const tw = d.tw || {};
    const events = d.events || [];
    const risks = d.risks || [];
    const tomorrow = d.tomorrow || [];
    const sources = d.sources || [];

    const dow = pct(us.dow), sp = pct(us.sp500), nas = pct(us.nasdaq);
    const twChange = pct(tw.change);
    const twDown = tw.change && tw.change.startsWith('-');

    const evHtml = events.map(e => `
      <div class="event-card">
        <div class="event-icon">${e.icon || '📌'}</div>
        <div class="event-body">
          <div class="event-title">${e.title}</div>
          <div class="event-detail">${e.detail}</div>
          <div class="event-meta">${e.meta || ''}</div>
        </div>
      </div>`).join('');

    const riskHtml = risks.map(r => `<div class="risk-item">${r}</div>`).join('');
    const tmrHtml = tomorrow.map(t => `<div class="tomorrow-item">${t}</div>`).join('');
    const srcHtml = sources.map(s => `<span class="source-chip">${s}</span>`).join('');
    const sectorHtml = (tw.sectors || []).map(s => `<span class="sector-tag">${s}</span>`).join('');

    document.getElementById('content').innerHTML = `
      <div class="fade-in">
        <div class="date-badge">${d.date} · 股市摘要</div>
        <div class="summary-text">${d.summary || ''}</div>

        <div class="section">
          <div class="section-label">🇺🇸 美股三大指數</div>
          <div class="index-grid">
            <div class="index-card">
              <div class="index-name">DOW JONES</div>
              <div class="index-val ${dow.cls}">${dow.text}</div>
            </div>
            <div class="index-card">
              <div class="index-name">S&amp;P 500</div>
              <div class="index-val ${sp.cls}">${sp.text}</div>
            </div>
            <div class="index-card">
              <div class="index-name">NASDAQ</div>
              <div class="index-val ${nas.cls}">${nas.text}</div>
            </div>
          </div>
        </div>

        <div class="section">
          <div class="section-label">🇹🇼 台股加權指數</div>
          <div class="tw-block">
            <div class="tw-main">
              <div class="tw-pts ${twDown ? 'down' : ''}">${tw.points || '—'}</div>
              <div class="tw-change ${twDown ? 'down' : ''}">${tw.change || ''}</div>
            </div>
            <div class="tw-note">${tw.note || ''}</div>
            <div class="sector-list">${sectorHtml}</div>
          </div>
        </div>

        ${evHtml ? `
        <div class="section">
          <div class="section-label">🌍 重大事件</div>
          <div class="events-list">${evHtml}</div>
        </div>` : ''}

        ${riskHtml ? `
        <div class="section">
          <div class="section-label">⚠️ 風險提示</div>
          <div class="risk-list">${riskHtml}</div>
        </div>` : ''}

        ${tmrHtml ? `
        <div class="section">
          <div class="section-label">🔭 明日觀察重點</div>
          <div class="tomorrow-list">${tmrHtml}</div>
        </div>` : ''}

        <div class="section">
          <div class="section-label">📎 資料來源</div>
          <div class="sources-row">${srcHtml}</div>
          <div class="generated">產出時間：${d.generated || '—'}</div>
        </div>
      </div>`;
  }
</script>
</body>
</html>
