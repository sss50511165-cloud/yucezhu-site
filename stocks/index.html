<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>股市摘要 — 雲端知識誌</title>
<link rel="stylesheet" href="../assets/theme.css">
<style>
  /* ── PAGE HERO ── */
  .page-hero {
    padding: 64px 40px 48px;
    max-width: 1100px;
    margin: 0 auto;
    animation: fadeUp 0.7s 0.1s cubic-bezier(0.25, 0.1, 0.25, 1) both;
  }

  .page-hero h1 {
    font-size: clamp(32px, 5vw, 52px);
    line-height: 1.15;
    margin-top: 8px;
  }

  .page-hero h1 .t-main {
    font-family: 'Playfair Display', serif;
    font-weight: 500;
    color: var(--text-primary);
  }

  .page-hero h1 .t-brand {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 400;
    font-style: italic;
    color: var(--accent);
  }

  .page-hero-sub {
    margin-top: 16px;
    font-family: 'Noto Serif TC', serif;
    font-size: 14px;
    font-weight: 300;
    color: var(--text-secondary);
    line-height: 1.8;
    max-width: 420px;
  }

  /* ── MAIN LAYOUT ── */
  .main {
    max-width: 1100px;
    margin: 0 auto;
    padding: 0 40px 80px;
    display: grid;
    grid-template-columns: 1fr 280px;
    gap: 48px;
    align-items: start;
  }

  /* ── CARD LIST ── */
  .stock-list {
    list-style: none;
    display: grid;
    gap: 20px;
  }

  .stock-list li {
    opacity: 0;
    transform: translateY(16px);
    transition: opacity 0.6s cubic-bezier(0.25, 0.1, 0.25, 1), transform 0.6s cubic-bezier(0.25, 0.1, 0.25, 1);
  }

  .stock-list li.in-view {
    opacity: 1;
    transform: translateY(0);
  }

  .stock-list a {
    text-decoration: none;
    color: inherit;
    display: block;
  }

  /* ── SIDEBAR ── */
  .sidebar {
    display: grid;
    gap: 20px;
    animation: fadeUp 0.7s 0.3s cubic-bezier(0.25, 0.1, 0.25, 1) both;
  }

  .about-text {
    font-family: 'Noto Serif TC', serif;
    font-size: 13px;
    font-weight: 300;
    color: var(--text-tertiary);
    line-height: 1.9;
  }

  .about-text strong {
    color: var(--text-primary);
    font-weight: 400;
  }

  /* ── RESPONSIVE ── */
  @media (max-width: 768px) {
    .page-hero { padding: 48px 20px 36px; }
    .main { grid-template-columns: 1fr; padding: 0 20px 60px; }
  }
</style>
</head>
<body>

<button id="theme-toggle" aria-label="切換明暗模式" style="
  position: fixed;
  top: 16px;
  right: 16px;
  z-index: 1000;
  background: var(--bg-card);
  border: 0.5px solid var(--border-color);
  border-radius: 50%;
  width: 40px;
  height: 40px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 16px;
  color: var(--accent);
  transition: all 0.3s ease;
  backdrop-filter: blur(8px);
" onclick="
  const t = document.documentElement.dataset.theme === 'light' ? '' : 'light';
  document.documentElement.dataset.theme = t;
  localStorage.setItem('theme', t);
  this.textContent = t === 'light' ? '🌙' : '☀️';
">☀️</button>
<script>
  (function(){
    const saved = localStorage.getItem('theme');
    if (saved) {
      document.documentElement.dataset.theme = saved;
      const btn = document.getElementById('theme-toggle');
      if (btn) btn.textContent = saved === 'light' ? '🌙' : '☀️';
    }
  })();
</script>

<!-- NAV -->
<nav class="site-nav">
  <a class="nav-logo" href="../">
    <div class="nav-logo-mark"><span>誌</span></div>
    <div class="nav-logo-title">
      <span class="t-zh">雲端</span>
      <span class="t-brand">知識誌</span>
    </div>
  </a>
  <a class="nav-back" href="../">← 返回首頁</a>
</nav>

<!-- HERO -->
<div class="page-hero">
  <div class="kicker">
    <div class="kicker-en">Market Briefing</div>
    <div class="kicker-zh">市場脈動</div>
    <div class="kicker-line"></div>
  </div>
  <h1><span class="t-main">每日財經</span><br><span class="t-brand">知識彙整</span></h1>
  <p class="page-hero-sub">整合台股、美股重大事件，每日更新。<br>簡潔閱讀，快速掌握市場脈動。</p>
</div>

<div class="accent-bar" style="margin: 0 40px 40px;"></div>

<!-- MAIN -->
<div class="main">

  <!-- LIST -->
  <section>
    <div class="kicker" style="margin-bottom: 20px;">
      <div class="kicker-en">All Summaries</div>
      <div class="kicker-line"></div>
    </div>
    <div class="search-box">
      <input type="text" id="search-input" placeholder="搜尋關鍵字..." autocomplete="off">
    </div>
    <ul class="stock-list" id="stock-list">
      <li><div class="loading-row"><div class="loading-dot"></div><span>載入中...</span></div></li>
    </ul>
  </section>

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="sidebar-card" id="bookmark-panel" style="display:none;">
      <div class="sidebar-card-head">My Bookmarks</div>
      <div class="sidebar-card-body" id="bookmark-list"></div>
    </div>

    <div class="sidebar-card">
      <div class="sidebar-card-head">Statistics</div>
      <div class="sidebar-card-body">
        <div class="stat-row">
          <span class="stat-label">已收錄摘要</span>
          <span class="stat-val" id="stat-count">—</span>
        </div>
        <div class="stat-row">
          <span class="stat-label">最新更新</span>
          <span class="stat-val" id="stat-latest" style="font-size:13px">—</span>
        </div>
      </div>
    </div>

    <div class="sidebar-card">
      <div class="sidebar-card-head">About</div>
      <div class="sidebar-card-body">
        <p class="about-text">
          <strong>雲端知識誌</strong> 每日自動整合台股、美股重大事件，以簡潔易讀的方式呈現市場摘要，幫助您快速掌握市場脈動。
        </p>
      </div>
    </div>
  </aside>
</div>

<!-- FOOTER -->
<footer class="site-footer">
  <div class="footer-left">© 2026 雲端知識誌 · 每日自動更新</div>
  <div class="footer-right">Powered by Claude · Hosted on GitHub Pages</div>
</footer>

<script src="../assets/bookmarks.js"></script>
<script>
  function updateBookmarkPanel() {
    const bm = getBookmarks().filter(b => b.type === 'stock');
    const panel = document.getElementById('bookmark-panel');
    const list = document.getElementById('bookmark-list');
    if (!panel || !list) return;
    if (bm.length === 0) { panel.style.display = 'none'; return; }
    panel.style.display = '';
    let html = '<div class="bookmark-items">';
    bm.forEach(b => {
      html += `<a href="./viewer.html?d=${encodeURIComponent(b.key)}" class="bookmark-item">
        <div class="bookmark-item-title">${b.title}</div>
        <div class="bookmark-item-meta">${b.date}</div>
      </a>`;
    });
    html += '</div>';
    html += '<div class="bookmark-hint">收藏存在瀏覽器中，不需登入</div>';
    list.innerHTML = html;
  }

  fetch('../stocks.json')
    .then(r => r.json())
    .then(data => {
      const files = Array.isArray(data) ? data : (data.files || []);
      const sorted = [...files].sort().reverse();
      const list = document.getElementById('stock-list');
      list.innerHTML = '';

      document.getElementById('stat-count').textContent = sorted.length;
      if (sorted.length > 0) {
        document.getElementById('stat-latest').textContent =
          sorted[0].replace('.json', '').replace('.html', '');
      }

      if (sorted.length === 0) {
        list.innerHTML = '<li><div class="empty-state">尚無摘要，敬請期待</div></li>';
        return;
      }

      sorted.forEach((file, i) => {
        const date = file.replace('.json', '').replace('.html', '');
        const stockInfo = { type:'stock', title:'股市摘要 — '+date, dept:'', date:date, url:'./viewer.html?d='+date };
        const infoAttr = JSON.stringify(stockInfo).replace(/"/g, '&quot;');
        const li = document.createElement('li');
        li.innerHTML = `
          <a href="./viewer.html?d=${date}">
            <div class="card">
              <div class="card-header">
                <div class="card-tag">每日摘要</div>
                <div class="card-date">${date}</div>
              </div>
              <div class="card-title">股市摘要 — ${date}</div>
              <div class="card-rule"></div>
              <div class="card-excerpt">台股美股每日重點事件整理，掌握市場動態。</div>
              <div class="card-header" style="margin-top:14px; margin-bottom:0;">
                <div style="display:flex;align-items:center;">
                  <span class="card-read">閱讀全文 <span class="arrow">→</span></span>
                  <span class="card-readtime">⏱ 約 3 分鐘</span>
                </div>
                <button class="bookmark-btn" data-key="${date}" aria-label="收藏" onclick="event.preventDefault();event.stopPropagation();toggleBookmark('${date}',${infoAttr},this);">☆</button>
              </div>
            </div>
          </a>`;
        list.appendChild(li);

        if (isBookmarked(date)) {
          const btn = li.querySelector('.bookmark-btn');
          if (btn) { btn.textContent = '★'; btn.classList.add('bookmarked'); }
          li.querySelector('.card')?.classList.add('card-bookmarked');
        }
      });

      updateBookmarkPanel();
    })
    .catch(() => {
      document.getElementById('stock-list').innerHTML =
        '<li><div class="empty-state">無法載入資料，請稍後再試</div></li>';
    });
  document.getElementById('search-input').addEventListener('input', function() {
    const keyword = this.value.toLowerCase().trim();
    document.querySelectorAll('#stock-list li').forEach(li => {
      const text = li.textContent.toLowerCase();
      li.style.display = text.includes(keyword) || keyword === '' ? '' : 'none';
    });
  });
</script>

<button id="back-to-top" aria-label="回到頂部" title="回到頂部">↑</button>
<script>
(function(){
  const btn = document.getElementById('back-to-top');
  window.addEventListener('scroll', () => {
    btn.classList.toggle('visible', window.scrollY > 400);
  });
  btn.addEventListener('click', () => {
    window.scrollTo({ top: 0, behavior: 'smooth' });
  });
})();
</script>

<script>
(function(){
  const observer = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      if (entry.isIntersecting) {
        entry.target.classList.add('in-view');
        observer.unobserve(entry.target);
      }
    });
  }, { threshold: 0.1 });

  const lists = document.querySelectorAll('.stock-list');
  const mo = new MutationObserver(() => {
    document.querySelectorAll('.stock-list li:not(.in-view)').forEach((li, i) => {
      li.style.transitionDelay = `${i * 0.1}s`;
      observer.observe(li);
    });
  });
  lists.forEach(list => mo.observe(list, { childList: true }));
})();
</script>
</body>
</html>
