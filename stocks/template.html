<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>股市摘要 · 雲端知識誌</title>
<link rel="stylesheet" href="../assets/theme.css">
<style>
  .wrap {
    max-width: 680px;
    margin: 0 auto;
    padding: 0 0 72px;
    position: relative;
    z-index: 1;
  }

  /* HERO */
  .hero {
    padding: 28px 24px 20px;
    border-bottom: 0.5px solid var(--border-color);
  }

  .hero-date {
    font-family: 'Cormorant Garamond', serif;
    font-size: 11px;
    font-style: italic;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 12px;
  }

  .hero-summary {
    font-family: 'LXGW WenKai TC', 'Noto Serif TC', serif;
    font-size: 16px;
    font-weight: 300;
    color: var(--text-primary);
    line-height: 1.9;
    padding-left: 16px;
    border-left: 2px solid var(--accent);
  }

  /* SECTION */
  .section {
    padding: 28px 24px 0;
  }

  .label {
    font-family: 'Cormorant Garamond', serif;
    font-size: 11px;
    font-style: italic;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .label::after {
    content: '';
    flex: 1;
    height: 0.5px;
    background: var(--border-color);
  }

  /* INDICES */
  .index-row {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
  }

  .idx {
    background: var(--bg-card);
    border: 0.5px solid var(--border-color);
    border-radius: 4px;
    padding: 14px 16px;
  }

  .idx-name {
    font-family: 'Cormorant Garamond', serif;
    font-size: 10px;
    font-style: italic;
    letter-spacing: 2px;
    color: var(--text-tertiary);
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  .idx-val {
    font-family: 'Playfair Display', serif;
    font-size: 20px;
    font-weight: 500;
  }

  /* TW */
  .tw-card {
    background: var(--bg-card);
    border: 0.5px solid var(--border-color);
    border-radius: 4px;
    padding: 20px;
  }

  .tw-big {
    font-family: 'Playfair Display', serif;
    font-size: 36px;
    font-weight: 500;
    line-height: 1;
  }

  .tw-pts {
    font-family: 'Cormorant Garamond', serif;
    font-size: 13px;
    font-style: italic;
    color: var(--text-tertiary);
    margin-top: 6px;
    margin-bottom: 12px;
  }

  .tw-note {
    font-family: 'LXGW WenKai TC', 'Noto Serif TC', serif;
    font-size: 15px;
    font-weight: 300;
    color: var(--text-secondary);
    line-height: 1.9;
    margin-bottom: 14px;
  }

  .chips {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
  }

  .chip {
    font-family: 'Cormorant Garamond', serif;
    font-size: 12px;
    font-style: italic;
    color: var(--accent);
    border: 0.5px solid rgba(201, 147, 91, 0.25);
    border-radius: 2px;
    padding: 3px 12px;
    background: rgba(201, 147, 91, 0.06);
  }

  /* EVENTS */
  .events { display: grid; gap: 0; }

  .event-item {
    display: flex;
    gap: 16px;
    align-items: flex-start;
    padding: 16px 0;
    border-bottom: 0.5px solid var(--border-color);
  }

  .event-item:last-child { border-bottom: none; }

  .event-icon {
    font-size: 20px;
    flex-shrink: 0;
    width: 28px;
    text-align: center;
    margin-top: 2px;
  }

  .event-title {
    font-family: 'LXGW WenKai TC', 'Noto Serif TC', serif;
    font-size: 16px;
    font-weight: 400;
    color: var(--text-primary);
    margin-bottom: 4px;
  }

  .event-detail {
    font-family: 'LXGW WenKai TC', 'Noto Serif TC', serif;
    font-size: 15px;
    font-weight: 300;
    color: var(--text-secondary);
    line-height: 1.9;
  }

  .event-meta {
    font-family: 'Cormorant Garamond', serif;
    font-size: 11px;
    font-style: italic;
    color: var(--text-tertiary);
    margin-top: 6px;
    letter-spacing: 1px;
  }

  /* RISKS */
  .risk-list, .obs-list {
    list-style: none;
    display: grid;
    gap: 8px;
  }

  .risk-list li {
    padding: 14px 18px;
    background: var(--bg-card);
    border: 0.5px solid var(--border-color);
    border-left: 2px solid var(--warn);
    border-radius: 0 4px 4px 0;
    font-family: 'LXGW WenKai TC', 'Noto Serif TC', serif;
    font-size: 15px;
    font-weight: 300;
    color: var(--text-secondary);
    line-height: 1.9;
  }

  .obs-list li {
    padding: 14px 18px;
    background: var(--bg-card);
    border: 0.5px solid var(--border-color);
    border-left: 2px solid var(--accent);
    border-radius: 0 4px 4px 0;
    font-family: 'LXGW WenKai TC', 'Noto Serif TC', serif;
    font-size: 15px;
    font-weight: 300;
    color: var(--text-secondary);
    line-height: 1.9;
  }

  /* FOOTER */
  .tmpl-footer {
    margin-top: 48px;
    padding: 18px 24px;
    border-top: 0.5px solid var(--border-color);
    display: flex;
    flex-wrap: wrap;
    justify-content: space-between;
    gap: 8px;
  }

  .footer-sources {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
  }

  .src-chip {
    font-family: 'Cormorant Garamond', serif;
    font-size: 11px;
    font-style: italic;
    letter-spacing: 1px;
    color: var(--text-tertiary);
    border: 0.5px solid var(--border-color);
    border-radius: 2px;
    padding: 3px 10px;
  }

  .footer-time {
    font-family: 'Cormorant Garamond', serif;
    font-size: 11px;
    font-style: italic;
    color: var(--text-tertiary);
    letter-spacing: 1px;
  }

  .state-msg {
    padding: 60px 24px;
    text-align: center;
    color: var(--text-tertiary);
    font-family: 'Cormorant Garamond', serif;
    font-size: 14px;
    font-style: italic;
    letter-spacing: 1px;
  }

  .loaded {
    animation: fadeUp 0.5s cubic-bezier(0.25, 0.1, 0.25, 1) both;
  }

  @media (max-width: 480px) {
    .index-row { grid-template-columns: 1fr 1fr; }
    .section { padding-left: 16px; padding-right: 16px; }
    .hero { padding: 20px 16px; }
  }
</style>
</head>
<body>
<div class="wrap">

<nav class="site-nav" style="padding: 0 24px;">
  <a class="nav-logo" href="../">
    <div class="nav-logo-mark"><span>誌</span></div>
    <div class="nav-logo-title">
      <span class="t-zh">雲端</span>
      <span class="t-brand">知識誌</span>
    </div>
  </a>
  <a class="nav-back" href="./index.html">← 返回股市列表</a>
</nav>

<div id="app">
  <div class="state-msg"><span class="loading-dot" style="display:inline-block;margin-right:8px;"></span>載入中...</div>
</div>

</div>

<script>
const params = new URLSearchParams(window.location.search);
let date = params.get('date');

if (!date) {
  const pathMatch = window.location.pathname.match(/(\d{4}-\d{2}-\d{2})/);
  if (pathMatch) date = pathMatch[1];
}

if (!date) {
  document.getElementById('app').innerHTML =
    '<div class="state-msg">缺少日期參數<br><small style="color:var(--text-tertiary)">網址應為 ?date=YYYY-MM-DD</small></div>';
} else {
  document.title = `股市摘要 ${date} · 雲端知識誌`;
  fetch(`/stocks/${date}.json`)
    .then(r => { if (!r.ok) throw new Error('not found'); return r.json(); })
    .then(render)
    .catch(() => {
      document.getElementById('app').innerHTML =
        `<div class="state-msg">找不到 ${date} 的摘要資料</div>`;
    });
}

function cls(val) {
  if (!val) return '';
  const s = val.toString();
  if (s.startsWith('+') || s.startsWith('▲')) return 'up';
  if (s.startsWith('-') || s.startsWith('▼')) return 'down';
  return '';
}

function render(d) {
  const events = (d.events || []).map(e => `
    <div class="event-item">
      <span class="event-icon">${e.icon || '📌'}</span>
      <div>
        <div class="event-title">${e.title}</div>
        <div class="event-detail">${e.detail}</div>
        ${e.meta ? `<div class="event-meta">${e.meta}</div>` : ''}
      </div>
    </div>`).join('');

  const risks = (d.risks || []).map(r => `<li>${r}</li>`).join('');
  const tomorrow = (d.tomorrow || []).map(t => `<li>🔍 ${t}</li>`).join('');
  const sectors = (d.tw?.sectors || []).map(s => `<span class="chip">${s}</span>`).join('');
  const sources = (d.sources || []).map(s => `<span class="src-chip">${s}</span>`).join('');

  const us = d.us || {};
  const tw = d.tw || {};

  document.getElementById('app').innerHTML = `
    <div class="loaded">

    <div class="hero">
      <div class="hero-date">${d.date || date} · 股市摘要</div>
      <div class="hero-summary">${d.summary || ''}</div>
    </div>

    <div class="section">
      <div class="label">美股三大指數</div>
      <div class="index-row">
        <div class="idx">
          <div class="idx-name">Dow Jones</div>
          <div class="idx-val ${cls(us.dow)}">${us.dow || '—'}</div>
        </div>
        <div class="idx">
          <div class="idx-name">Nasdaq</div>
          <div class="idx-val ${cls(us.nasdaq)}">${us.nasdaq || '—'}</div>
        </div>
        <div class="idx">
          <div class="idx-name">S&amp;P 500</div>
          <div class="idx-val ${cls(us.sp500)}">${us.sp500 || '—'}</div>
        </div>
      </div>
    </div>

    <div class="section">
      <div class="label">台股</div>
      <div class="tw-card">
        <div class="tw-big ${cls(tw.change)}">${tw.change || '—'}</div>
        ${tw.points ? `<div class="tw-pts">${tw.points} 點</div>` : ''}
        <div class="tw-note">${tw.note || ''}</div>
        <div class="chips">${sectors}</div>
      </div>
    </div>

    ${events ? `
    <div class="section">
      <div class="label">重大國際財經事件</div>
      <div class="events">${events}</div>
    </div>` : ''}

    ${risks ? `
    <div class="section">
      <div class="label">今日風險提醒</div>
      <ul class="risk-list">${risks}</ul>
    </div>` : ''}

    ${tomorrow ? `
    <div class="section">
      <div class="label">明日觀察</div>
      <ul class="obs-list">${tomorrow}</ul>
    </div>` : ''}

    <div class="tmpl-footer">
      <div class="footer-sources">${sources}</div>
      <div class="footer-time">產出：${d.generated || date}</div>
    </div>

    </div>`;
}
</script>
</body>
</html>
